body:
  text: 卷上按廣雅曰略要也王念孫疏證曰孟子滕文公篇此其大略也趙岐注云略要也又說文曰略經略土地也段玉裁注曰引申之凡舉其要而用功少者曰略略者對詳而言觀此諸說則要略二字其義更晰矣臟腑經絡先後病脈證第一按傷寒論每篇首冠以辨字今要略無之者蓋後人所刪也外臺療瘧方引張仲景傷寒論每條首有辨瘧病辨瘧脈等字亦足以證論十三首三當作五脈證三條諸本作二條宜從問曰上工治未病何也徐醫中有大關目不可專指一病者仲景於首卷特揭數十端以定治療之法此則論五行相剋之理必以次傳而病亦當預備以防其傳也魏此條乃仲景總揭諸病當預圖於早勿待病成方治以貽悔也治之預則用力少而成功多所謂曲突徙薪之勳宜加於焦頭爛額之上也先言肝者以四時之氣始乎春五臟之氣始於肝洪範言履端於始序則不愆故先引肝以為之准云朱甘味入脾兼能緩肝和調兩臟令弗相牋也按趙氏於內經辛補仲景酸補之理詳為之辨蓋繫於尤氏所據文繁不具錄夫人稟五常因風氣而生長稟周本作秉按禮記樂記曰道五常之行注五常五行也禮運曰故人者其天地之德陰陽之交鬼神之會五行之秀氣也又曰故人者天地之心也五行之端也楊上善太素經注曰風氣一也徐緩為氣急疾為風人之生也感風氣以生其為病也因風氣為病是以風為百病之長集韻般字下曰亦數別之名無犯王法蓋謂無犯王者之法律以罹墨劓剕宮等刑白虎通曰犯王法使方伯誅之先兄曰竭乏即內經以欲竭其精之義又金鑑以為內所因中虛外所因中實不內外因非中外虛實徐氏以為適中經絡三句應前內因一段四肢才覺重滯四句應前外因一段更能無犯王法二句應前房室一段並是然更就服食節其冷熱苦酸辛甘句考之則三者房室下恐脫服食二字否則彼句內蘊有服食失節乎如此看做殆覺上下相應於病理亦相葉而更能無犯王法以下五句都應前房室一段又按喜多村直寬曰服食即衣服飲食之謂靈師傳篇云飲食衣服亦欲適寒溫可以徵焉斯說得之小島尚質曰陳天竺三藏真諦釋迦毗羅仙人金七十論云三苦一依內二依外三依天此亦論三因與經旨略相似問曰病人有氣色見於面部胸上周作胸中按魏曰鼻為肺之開竅而主一身之元氣者也五臟之氣莫不稟受於肺而五臟之真色亦必隨氣之出入而發見於鼻頭此鼻頭所以可驗五臟之真色也此解與尤意異然宜備一說痰飲篇曰膈間支飲其人喘滿心下痞堅面色黧黑蓋與本條相發又色黃者色白者二證沈魏朱屬之鼻頭檢千金方曰論云鼻頭微白者亡血設令微赤非時者死病人色白者皆亡血也又曰凡人候鼻頭色黃法小便難也蓋是三家所本師曰病人語聲寂然按喑當與韽通周禮典同職微聲韽鄭玄注韽聲小不成也師曰息搖肩者心中堅按趙曰此仲景因呼息以為察病之法與後條吸對言以舉端耳徐注本於此又沈氏以為此言喘息有痰氣肺脹肺痿之別其說似是然不及魏之穩切但魏唾沫解恐非沈曰肺熱葉焦氣弱不振津液化而為涎上溢於口故吐涎沫似是蓋古所謂沫者即今之痰涎不必是白沫宜參肺痿及痰飲篇又金鑑痰嗽肺痿之辨欠妥又按徐氏註上氣色條有曰但望法貴在神氣動靜之間此言甚妙如欲候氣息者最所宜加思矣師曰吸而微數沉作息而微數且曰遠當作遲字並誤按朱以上焦下焦二句為虛者不治之註腳謬矣又魏注中筋脈二字宜刪師曰寸口脈動者按此條上文言脈不言色下文言色不言脈是互文見意故結以非其時色脈句問曰有未至而至為至而不至也上俞本類聚並有此字徐此論天氣之至有過不及不言及醫然而隨時制宜之意在其中輯義尤注中至未得甲子下脫而天已溫或已得甲子而天反未溫及已得甲子十九字問曰寸脈沉大而滑脈經不設問答卒厥下有不知人三字口字無和上有溫字按此條脈經題云平卒屍厥脈證巢源載之屍厥候中而雜療方屍厥下原注曰脈證見上卷者徐鎔以為此條則殆是扁鵲所療虢太子之病也又素陽明脈解篇厥逆連臟則死連經則生問曰脈脫入臟即死按先兄曰此條諸註失鑿蓋是承上條更申其理脈即血脈系血氣之省文考字書脫或然之辭宜為助語看始妥脫本外脫之義脫而稱入甚不相協素方盛衰論脈脫不具診無常行吳崑注云脈或不顯也可以相證矣吳子勵士篇脫其不勝取笑於諸侯後漢書李通傳事既未然脫可免禍宋趙德麟侯鯖錄曰脫者可也爾也謂不定之詞漢晉人多言脫如何亦或也胡三省通鑑注云脫者或也又曰脫者未可必之辭也此皆可例問曰陽病十八何謂也飥類聚作飪周此總內經所著之病而為之分陰陽悉表裡合上下內外以立言庶幾經絡明腑臟著所因顯不致散而難稽也如三陽在外病頭痛等六證則各有所行之經各顯本經之證三而六之非十八乎而三陰之在裡者亦然五臟各有十八合計為九十病其為病則於靈樞論心脈為瘛瘲班班可考矣若六腑則何如腑居內而合於經者也故邪之在腑者合外於經其受患為淺而欲散不難不若五臟之深且甚焉故曰微也其為病內經有分屬仲景括為一百八病蓋因腑之六以為數也凡此共二百三十四病統內外而言之也人之一身上下表里盡之矣而所謂清濁大小邪者一為霧露一為地濁本天者親上本地者親下百病之長傷人之陽肅殺之氣傷人之陰者是也從口入者為內傷亦足使人發熱腹痛喘嘔脹滿不去其陳而致新不足以為功魏大約陽病皆軀殼以外之病而陰病皆軀殼以里之病耳按此條分為兩段前段是就經絡臟腑而舉疾證數目程注錯算周氏為是後漢書郭玉傳方診六微之技亦不審其義後段說五邪而分三節先就其性立名風善行而數變其性見千金更反復示其所中余義結以極寒極熱可謂盡矣但注家於大邪小邪迂曲費說甚失經旨不知三節互相照應大邪言風小邪言寒其義瞭然周氏所解殊卓蓋風則泛散故稱之大寒則緊迫故稱之小且風之傷人為最多寒則稍遜亦其所以得名歟風性輕揚故先中表而令脈浮寒性慓悍故直中里而令脈急又按素太陰陽明論曰故傷於風者上先受之傷於濕者下先受之靈百病始生篇曰風雨則傷上清濕則傷下辨脈法曰寸口脈陰陽俱緊者法當清邪中於上焦濁邪中於下焦皆文異旨近又陶氏本草序例曰夫病之所由來雖多端而皆關於邪邪者不正之目謂非人身之常理風寒暑濕飢飽勞逸皆各是邪非獨鬼氣疫癘者矣本條邪字得此言而始明矣先兄曰盧文弨鐘山札記詳辨䅽字宜參夫病痼疾加以卒病按說文痼久病也汲古閣刊宋本作㽽訛又金鑑所引趙注二注本以為周氏師曰五臟病各有得者愈按尤氏引藏氣法時論宣明五氣篇五味篇為徵宜參又成氏注厥陰篇除中條曰若胃氣絕得面則必發熱若不發熱者胃氣尚在也恐是寒極變熱因暴熱來而復去使之能食非除中也金匱要略云病人素不能食而反暴思之必發熱是成氏既以思字作食義看夫諸病在臟按此條豬苓湯不過姑假之以備隅反徐沈朱附出其方深誤余述此篇仲景揭示辨證處治之總例而其最緊要在首章與第二章今深繹其意則寓有三義蓋人之有身以臟腑為之主宰故論理疾病必始自臟腑實為軒岐相傳之學故仲景舉之於首以為後人模範其義一也病之大體不過二端曰內傷曰外感是已首章所主在內傷次章所主在外感兩相對列使人知病之不出二端其義二也治病之要不過防微渴穿鬥鑄先聖所戒是以首章舉治未病而次條亦曰未流傳臟即醫治之曰勿令九竅閉塞皆示見微得過之意其義三也此三義者豈可不謂非醫家入學之門徑乎其他諸條辨色辨聲辨氣息辨色脈應否辨脈之先後診察之法盡矣病有起於急遽者吉凶不可不察內因之病皆有數目外感之疾各有法度五臟之病有所得有所惡亦辨證之綱領也如夫天氣消長人身亦應之則其理不得不講也施治之法先示防微又示淺深之有別又論病之表裡新久必有先後之序而篇末一章發攻導諸劑之秘焉夫然後辨證處治之例無出於此篇範圍之外則此篇者真醫家之大經大法也痓濕暍病脈證第二俞本證下有治字是論一首脈證十二條當作十六條方十一首太陽病發熱無汗太陽病發熱汗出按反惡寒錢注竟屬牽強蓋反是而字訛千金翼可以徵焉千金翼作而反惡寒竊想反字後人從本經所補入不惡寒諸注亦不確巢源無不字林億等校傷寒論及總病論並既引證之為是要之此二證俱有惡寒惟須以無汗與汗出為表實表虛之分不繫惡寒不惡寒也栝蔞桂枝湯條曰太陽病其證備亦可以徵又按趙氏曰所謂柔痙者非不強也但剛痙強而有力柔痙強而無力為異爾此金鑑所本又聖惠方曰陽痙即易瘥陰痙即難瘥又曰柴胡散治傷寒陰痙閉目仰面石膏散治傷寒陽痙通身熱仰目此解惑論所本先兄曰曲禮剛日柔日即陰陽之義太陽病發熱脈沉而細者按脈沉而細徐錢以為痙病正脈然則細是緊細之細非微細之細而痙之必難治程鑑等以為痙見此脈者氣少之候故難治夫風病下之則痓按風病猶言風家不過與前條均言太陽病瘡家雖身疼痛不可發汗按瘡家謂金瘡家瘡古作創說詳於傷寒論述義中蓋身疼痛本麻黃湯所主如金瘡家軀殼血乏縱得傷寒倘發其汗則筋脈益燥遂為痙病也此與破傷風之邪入自瘡口者其機稍異又按以上三條言痙病所由醫通每處一方非是病者身熱足寒頸項強急原注浛浛字趙本不復張錫駒曰頸項強急則不能轉舒而動搖故獨頭面搖也成氏曰卒口噤皆不常噤也有時而緩按此條諸證皆是繫於邪著筋脈風熱上扇之所致諸注強為解事不必然又軒村寧熙曰若發其汗以下十七字蓋濕病中之文今錯在此也此說似是暴腹脹大者為欲解徐痓家之脈總不離於沉緊今之伏弦亦沉緊類耳按如故二字難解王肯堂曰此痙字恐當作死字非是夫痓脈按之緊如弦按轉筋篇轉筋之為病其人臂腳直脈上下行微弦太陽病其證備身體強𠘧𠘧然徐太陽病其證備者身熱頭痛汗出也程太陽病其證備言頭痛項強發熱惡風寒具見也按太陽證備尤引趙氏其說近迂徐程為穩脈反沉遲者與桂枝加芍藥生薑人參新加湯證殆同其轍又按栝蔞桂枝湯為柔痙初治之方先教諭別有痙病論曰剛痙表證與葛根湯入胃者承氣湯柔痙表證與栝蔞桂枝湯倘裡氣亦虛者桂枝加附子湯芍藥甘草附子湯真武湯活人附術散聖濟附子散之屬理所宜然亡血產後陽盛陰虛或有不中與附子者乃參歸湯人參建中湯及景岳滋補數方當採擇而用焉又沈氏曰有竹葉湯加附子以治產後頸項強乃陽虛濕盛之痙此言不核然其方可借為柔痙裡虛之治栝蔞桂枝湯方按三升下似脫去滓二字太陽病無汗而小便反少按無汗則津液內多小便當利而反少者以其人津燥之故尤注謬矣痓為病胸滿口噤臥不著席按千金方曰諸反張大人脊下容側手小兒容三指者不可復治也此龐氏所據沈氏曰大承氣湯或見內實原有疏解非為攻下而設尤氏曰此痙病之屬陽明瘀熱者然無燥實見證自宜滌熱而勿蕩實乃不用調胃而用大承氣者豈病深熱極非此不能治歟然曰可與則猶有斟酌之意用者慎之朱氏曰急與大承氣以下其熱實則枳朴硝黃未始非滌熱生津除熱之神品也並與金鑑相發又按汪機醫學原理曰痙病方書皆謂感受風濕而致多用風藥予細詳之恐仍未備當作氣血內虛外邪干之所致蓋人百骸九竅必本氣血榮養始能運動觀內經云足得血而能步掌得血而能握目得血而能視等文可見蓋筋脈無血榮養則強直不能運動痙病之證是也但因有數者不同是以有氣虛不能引導津血以養筋脈而致者有津血不足無以榮養筋脈而致者有因痰火塞窒經隧以致津血不榮者有因真元本虛六淫之邪乘襲致血不榮養者雖有數因不同其於津血有虧無以滋榮經脈則一詳先哲謂汗下過多及病後產後與大耗精耗血之病皆能作痙其意可見學者不可力執局方專用風藥而療在乎分因用藥可也以上汪說蓋辨痙之非濕此為藍本其見甚卓惜強分頭緒稍屬多事如張介賓專以內因論似不熟繹經文者則又遜於汪氏一等矣又按柯氏曰夫痓之始也本非正病必夾雜於他病之中此說殆佳蓋其人本有某故而營血內乏或外感誤治而亡其津液俱使邪火就燥以著筋脈遂為勁急也太陽病發汗太多風病誤汗下瘡家過汗皆是痙之所因而併產後發痙觀之則其非徑得之者可以見矣其證必備表候而冠以太陽病則外邪所觸而致者亦可以知矣太陽病關節疼痛而煩玉函脈經細作緩活人書注曰脈細者非也此名以下徐沈朱作此名中濕亦曰濕痹其候云云非是按濕病有挾風寒者今此證則純於濕者故舉為濕病之首先後篇所謂濕流關節是也成氏既引此句以為解此條尤氏注甚核蓋濕邪不藉風寒則更易濡滯勢必趣里是以治法不事驅表但利其小便則外濕亦隨消除也煩字錢注為當或以為心煩者誤矣大便反快句諸注未妥愚意快者快調和平之謂言小便不利者津液偏滲大腸法當濡瀉而今濕邪壅閉水氣內郁不敢漏泄故使大便反如平也注家多以濡瀉解快字然瀉利數行豈得云之快且小便不利者勢必瀉利則不宜下反字故知前注之非顧如此證綢繆失治必變遍身浮腫又按成氏曰痹痛也因其關節煩疼而名曰濕痹非腳氣之痹也此說本於許氏說文又魏氏曰濕氣不孤行必附於彆氣非風則寒今感人而關節疼痛知附於寒者多而為病於太陽者同也非是又黃仲理於此證擬方曰甘草附子湯麻黃連翹赤小豆湯並不確濕家之為病一身盡疼尤濕外盛者其陽必內郁濕外盛為身疼陽內鬱則發熱熱與濕合交蒸互郁則身色如熏黃熏者如煙之熏色黃而晦濕氣沉滯故也若熱黃則黃而明所謂身黃如橘子色也按此證亦純於濕者郭氏補亡論曰宜五苓散然其病屬外殆是麻黃連軺赤小豆湯所宜也宜以傷寒論述義濕熱條相參巢源風黃候曰凡人先患風濕復遇冷氣相搏則舉身疼痛發熱而體黃也又有風黃疸候並是別證濕家其人但頭汗出胸上趙作胸中尤寒濕居表陽氣不得外通而但上越為頭汗出朱背強惡寒者以背皆陽經所主為濕所痹也魏欲得被覆向火惡寒之甚矣按此濕鬱之甚者醫者誤下以為壞證噦與小便不利亦為下冷之驗胸滿亦為上熱之徵舌上如胎注家多於如字費解然胎本苔字以氣液蒸釀積於舌上恰如苔蘚之布鋪地面故云如苔或省云舌上苔後人改從肉旁而注家不知其本義遂至牽湊為說特成氏曰使舌上生白苔滑也其意可見焉或曰說文菭水衣也舌苔之苔為炲煤之炲看卻覺襯著說文炱灰炱煤也段氏曰通俗文云積煙曰炱煤玉篇云炱煤煙塵也蓋舌苔自薄而厚自白而黃而黑有積煙之象故以名之一說謂舌苔多因熱而生故從火為正者鑿矣甲乙經石門一名丹田在臍下二寸任脈氣所發蓋此所云泛稱下焦與關元同例關元見厥陰篇水氣篇婦人雜病篇太陽下篇五苓散條曰其人渴而口燥煩亦同語例濕家下之額上汗出徐雖仲景有下之早則噦句似乎太早不可而後則可下也不知此為頭汗而表未解者慮其有內入之事表邪內入則可下矣非言治濕可下也風濕相搏一身盡疼痛按朱氏曰以見此證宜桂枝加朮湯而非麻黃湯之任值天陰兩句更示人因時變通意此說不必蓋此條示風濕取汗之例不宜擬定一方此事難知曰服解藥而去沉困只頭痛目悶是知濕去而風不去則欲解也若風去而濕不去則不解何以然風則高濕則下而入里也按此說不了濕家病身疼發熱面黃而喘成氏曰病有淺深證有中外此則濕邪淺者也何以言之濕家不云關節煩疼而云身上疼痛是濕氣不流關節而外客肌表也不云發熱身似熏黃復云發熱面黃而喘是濕不幹於脾而薄於上焦也陰受濕氣則濕邪為深今頭痛鼻塞而煩是濕客於陽而不客於陰也濕家之脈當沉細為濕氣內流脈大者陽也則濕不內流而外在表也又以自能飲食胸腹別無滿痞為腹中和無病知其濕氣微淺內藥鼻中以宣泄頭中寒濕按本事方載有本證治驗二則並用瓜蒂散宜參濕家身煩疼可與麻黃加朮湯按此條乃證以方略者也今就其方考之是風濕之屬表實者發熱惡寒無汗其脈浮緊可推而知矣故以麻黃湯發散郁邪加朮以驅表濕此方之術宜用蒼朮非逐里濕也蓋仲景分風濕太陽病以為三等亦猶風寒之例又黎居士簡易方以此證為寒濕恐不然麻黃加朮湯方類聚甘草一兩病者一身盡疼發熱日晡所劇者按發熱日晡所劇者以濕為陰邪故得陰時而加甚也蓋此證濕邪滯著稍深而其表則實故於麻黃湯中增損以治之亦猶傷寒有葛根湯之例風濕脈浮身重汗出惡風者按此風濕之表虛者亦猶桂枝湯之例故嫌麻黃之峻其不用陽旦者豈以芍藥之澀乎防己黃耆湯注家以為實衛滲濕之劑此殊不然防己皮水有防己茯苓湯而陶隱居曰是療風水家要藥爾然則亦是系逐表濕之品黃耆但黃耆建中湯治裡虛其他如黃耆桂枝五物湯烏頭湯耆芍桂酒湯桂枝加黃耆湯皆用治濕著蓋托陽排結於濡滯之邪適然相對矣術之驅外濕既如前述況方後曰服後當如蟲行皮中曰令微汗瘥則知此方為風濕家解肌之治而非滲利之劑也明矣防己黃耆湯方方後如冰趙原刻作猶冰傷寒八九日風濕相搏周傷寒至八九日亦云久矣既不傳經復不入腑者因風濕持之也按風濕相搏句當與八九日字易位看金鑑本於沈氏以為風濕之病得之傷寒八九日非是白朮附子湯方朱如冒狀者正氣鼓動水氣亦隨而動正邪相搏未得遽勝之象所謂與朮附並走也按此方亦繫於發表既詳之傷寒論述義中茲不復贅風濕相搏骨節疼煩鑑汗出短氣惡風不欲去衣皆風邪壅盛也小便不利濕內蓄也尤此亦濕勝陽微之證其治亦不出助陽散濕之法云得微汗則解者非正發汗也陽復而陰自解耳按傷寒表證大端有二曰太陽病曰少陰病直中顧濕家亦不過如此蓋其太陽證治麻黃加朮湯等條是已如前條及此條俱系表虛寒證雖濕邪持久猶是少陰直中之類而桂枝附子湯朮附湯甘草附子湯亦猶麻黃附子細辛甘草二湯及附子湯之例矣尤氏於治濕諸方有總義殊欠核當仍不錄甘草附子湯方聖濟附子湯治中風四肢攣急身體沉重骨節煩疼即本方薑棗同煎百一選方史氏白朮散治腰痛於本方去甘草加芍藥太陽中暍發熱惡寒按數下之數字非誤即衍趙注雖已解過治之失於當救之道則未明按注言成氏予嘗思之此證屬陰陽俱虛脈弦細者陽虛也芤遲者陰虛也所以溫針復損其陰汗之復損其陽此證惟宜甘藥補正以解其熱爾即靈樞所謂陰陽俱不足補陽則陰竭補陰則陽脫可將以甘藥不可飲以剛劑按柯氏曰弦細芤遲不得連讀言中暑夾寒之脈或微弱或弦細或芤遲皆是虛脈蓋細與芤不並見柯說為是然此證雖陰陽俱虛而暑邪繵緣津液乏燥且熱證亦見遲脈則謂之夾寒恐不為當活人書曰問中暑何故灑然毛聳惡寒答曰經云四時八風之中人也因有寒暑寒則皮膚急腠理閉暑則皮膚緩腠理開開則灑然寒閉則熱而悶近人多不明中暑或作熱病法治之復用溫熱藥必致發黃斑出更為蓄血尤宜戒之按先兄曰鄭玄易通卦驗注太陽脈起足少指端至前兩板齒云岐子傷寒保命集曰口開前板齒乾燥者牙乃骨之精今燥者骨熱也此說近鑿又沈氏曰當以辛涼解表甘寒清裡即後人所用香茹散之類亦非是蓋此證清涼如黃連石膏之類滲利如五苓之類溫中如大順散之類俱非所適但香薷實解暑之聖藥或加一味於潤補方中如黃耆湯生脈散之類未必不為佳太陽中熱者暍是也按此條與前條即中暍虛實之別而暍證之理無出於此二端徐氏註上條曰此即潔古所謂靜而得之為中暑為陰證也注此條曰動而得之為中熱為陽證也誤矣潔古所謂中暑即夏月傷涼之病張介賓名為陰暑雖俱名曰暑其實非暑邪也又熱論所謂病暑者亦是傷寒以時而異其名耳不可援以注本經也又按山海經北囂之山鳥名𪄀㿐食之已暍莊子雜篇則陽曰夫凍者假衣於春暍者反冬乎冷風又方氏曰暍傷暑也史記禹扇暍淮南子武王蔭暍人於樾下左擁而右扇之是也太陽中暍身熱疼重而脈微弱按趙氏周氏有中暍統論欠核不錄云岐子傷寒保命集曰太陽中暍者身熱而煩汗欲出反飲冷水灌之汗不能出水行皮中而脈微弱表有水也當發其汗宜升麻湯升麻葛根芍藥甘草各一兩上銼細每服一兩水三盞煎服余述仲景之以痙濕暍合為一篇厥有旨哉夫天之氣風寒暑濕燥也其令之有愆與人之有虛皆相感為病而風寒二氣傷人最夥故著傷寒論以盡其理而他氣之傷人自表而入者舉之於雜病論此篇即是也然則宜云燥濕暍而除燥不言者何也蓋燥之一氣為秋之令而未見其傷人如風寒暑濕者是論之所以不及此也內經言秋傷於濕而不言秋傷於燥又言燥勝則乾者亦非秋燥之謂而所謂燥濕寒暑者是地之燥濕而非天氣之燥濕後世有燥疫及秋燥病等說要是門外揣摩不足信也但痙則以內燥而招外邪然其情機則稍異於風寒故與濕暍為篇益足以知秋燥之不為病矣且夫痙也濕也暍也其脈因證治纖悉具備如此則知殆是仲景之舊面而非後人所節略矣百合狐惑陰陽毒病證治第三徐鑑作脈證並治宜從論一首證三條按當二條方十二首論曰百合病者百脈一宗悉致其病也默然周作默默然趙言其百脈者舉夫數之眾多也猶言百骸爾程經脈十二絡脈三百六十五此緣大病後真陽已虛餘熱未盡周身百脈俱病是為百脈一宗悉致其病也按巢源千金並曰百合病者謂無經絡句百脈一宗悉致病也蓋無經絡者謂無經脈絡脈之別宗猶同姓為宗之宗一宗猶言一齊注家或以為朝宗之宗或以為宗尊之宗者俱失其義又按此病趙氏以為熱蓄不散積則毒生而傷其血所致與內經解㑊證無少異又與勞瘵同形狀其說甚長考郭氏傷寒補亡論曰此證又與素問所謂解㑊者相類王氏醫壘元戎舉王冰平人氣象論解㑊注曰惟百合一證與此比比相若並是趙氏所本要之趙說太謬又吳醫匯講有陶宗暄百合病贅言謂為心神渙散證亦非是百合病發汗後者郭氏辨千金有更發字曰其意謂百合本病汗下吐之後而更發非傷寒汗下吐之後變成百合病也反似百合病中治勞復之傷而不見正行汗下吐百合病之藥於義未甚安恐因數百年間傳錄校正誤有增加非孫氏之本文故活人書只用金匱本文不用千金增加更發等字而龐氏直改其語云治汗後百合病治下後百合病治吐後百合病尤使人不疑也百合知母湯方按此方與後三方服法中用煎字蓋系後人所改外臺作煮字宜從按先兄曰宋吳曾能改齋漫錄曰王原叔內翰云醫藥治病或以意類取至如百合治病似取其名嘔血用胭脂紅花似取其色淋瀝滯結則以燈心木通似取其類意類相假變化感通不可不知其旨也此說與魏意稍近又朱氏格致餘論曰本草藥之命名以能而名者百合當歸升麻防風滑石之類是也此說傎矣吳醫匯講王繩林曰古方惟百合湯用百合七隻配水三升頃友人言吾蘇陽山澄照寺前一片地上天然自產百合僅如錢大煮之清香絕勝療病極效可知百合入藥者以小為貴耳按本草嘉祐新補泉水條云久服卻溫調中下熱氣利小便可見其有瀉陽之功矣百合病不經吐下發汗先兄曰如初言患狀遷延不與初時異也鑑說恐非栝蔞牡蠣散方牡蠣熬周本熬作煅狐惑之為病狀如傷寒輯義脫其面目之目宜補脈經狀作其氣為狐下有狐惑之病並五字按下疳多止前陰牙疳不必及咽喉金鑑未為當蝕於下部則咽乾脈經作蝕於下部苦參湯淹洗之蝕於肛者薰諸本作熏宜從黃下周有散字按豬苓散圖經引張仲景本草原文茯苓下有術字水字上有與字輯義並系刊脫宜補病者脈數無熱微煩先兄曰總病論以此為狐惑證弟子稻葉元熙曰脈經千金亦編入於狐惑中按朱氏曰按此證若未成膿必不能食亦必另用清熱托毒方法凡治瘡瘍之理皆然無熱無字疑誤當是發熱也此說似是然據瘡癰篇無字不改而義通赤小豆當歸散方周本當歸十兩按漿水詳開於傷寒論述義瘥後勞復中茲不復贅陽毒之為病脈經作陽毒為病身重腰背痛煩悶不安狂言或走見鬼或吐血下痢其脈浮大數面赤斑斑如錦紋喉咽痛唾膿血五日可治至七日不可治也有傷寒一二日便成陽毒或服藥吐下後變成陽毒升麻湯主之陰毒之為病脈經作陰毒為病身重背強腹中絞痛咽喉不利毒氣攻心心下堅強短氣不得息嘔逆唇青面黑四肢厥冷其脈沉細緊數身如被打五六日可治至七日不可治也或傷寒初病一二日便結成陰毒或服藥六七日以上至十日變成陰毒甘草湯主之升麻鱉甲湯方今本肘後千金療陰毒有蜀椒與原注合周本當歸二兩再服取汗取字輯義偶脫宜補郭氏曰升麻甘草二湯觀其用藥性甚緩然諸家必先用之者以古人治陰陽二毒者惟此二湯故須用之以去其毒勢而後輔之以他藥也余述百合狐惑陰陽毒三病考之巢源千金多系傷寒後所變此其所以合為一篇歟但百合狐惑注家或謂在後世為某病然其說竟屬牽湊實不能知其為何證如陽毒陰毒就唐宋諸書考之則殆是三陽合病與少陰直中之類然仲景不舉之傷寒論中則知是別一種證而亦未明其為今之某病也然則三病也者古特有而今絕無者耳痘疹創於東漢腳氣盛於晉唐風會變遷理之所然庸詎疑於古今之有異乎瘧病脈證並治第四證二條按此上當脫脈字方六首師曰瘧脈自弦外臺師曰上有辨瘧脈三字可溫之作溫藥已脈經弦緊者作若脈緊數者宋本外臺亦作數緊巢源作脈數而緊者外臺可吐之作吐之瘥弦數上有脈字消息止之作消息之按此條就脈候以示瘧病證治之綱領蓋瘧是半表半裡之病其有表裡證亦少陽病邪之所派及不比傷寒太陽陽明之情機故其汗吐下亦與傷寒之治例不同所言弦數者多熱即白虎加桂枝湯柴胡去半夏加栝蔞湯證也弦小緊者下之瘥鱉甲煎丸是也弦遲者可溫之柴胡桂枝幹薑湯是也弦緊者可發汗牡蠣湯是也浮大者可吐之蜀漆散是也療瘧之法實不能出於此數件矣程氏謂不可考者恐不然也又刺瘧篇曰瘧脈小實急灸脛少陰又按弦數者風發也以飲食消息止之外臺無止字似義稍長巢源載本條無此二句有凡瘧先發如食頃乃可以治之過之則失時十七字本是刺瘧篇文又按外臺引此條後有一條云又辨瘧歲歲發至三歲發連日發不解者以脅下有痞也療之不得攻其痞但虛其津液先其時發汗其服湯已先小寒者漸引衣自覆汗出小便利則愈瘧者病人形瘦皮上必粟起巢源千金亦有此條千金連日上有或字巢源文少異末截作夫瘧其人形瘦皮必慄病瘧以月一日發外臺病上有問字其作期類聚圓作丸下並同鱉甲煎圓方外臺烏扇下無燒字葶藶二分石韋二分無去毛字厚朴三分下有炙字牡丹下無去心字半夏一分下有洗字蜣螂熬作炙桃仁作三分去皮尖熬灰字並作土字一斛五斗作一斛五升按古方所言分者系裁分之分非六銖為分之分此方鱉甲千金注作三兩而鍛灶下灰與清酒俱有定量則他藥以分稱者蓋後人所妄改其三分者宜作十八銖六分宜作一兩十二銖五分宜作一兩六銖一分宜作六銖二分宜作十二銖四分宜作一兩始合古義又輯義石韋紫威從草是書誤筆手按弟子山內慮曰此方逐血之品特多者以瘧至久則血道澀滯與邪搏結楊仁齋有瘧有水有血當以常山草果檳榔青皮烏梅甘草作劑加五靈脂桃仁為佐之說其意可見矣此說為是此方蓋崔氏所謂羈縻攻之者見外臺癥瘕中注家以為急治恐誤又本草鼠婦條圖經云張仲景主久瘧大鱉甲丸中使之以其主寒熱也又芒硝條陶隱居引皇甫士安解散硝石大凡說云硝石三月採於赤山聖濟鱉肉煎丸主證同不用鱉甲以生鱉肉半斤治如食法去紫威蜂窠赤硝加海藻紫菀大戟各一分余藥亦皆一分桑螵蛸一兩修制與本方同師曰陰氣孤絕外臺引師曰上有辨瘧病三字則熱而作而脈微者其候必七字肌作脫類聚亦作脫溫瘧者其脈如平脈經作瘧但見熱者溫瘧也其脈平身無寒但熱骨節疼煩時嘔朝發暮解暮發朝解名曰溫瘧白虎加桂枝湯主之巢源曰夫病瘧六七日但見熱者溫瘧矣又千金外臺文互有異今不繁載按內經以先熱後寒為溫瘧仲景則以無寒但熱為溫瘧稍與上條癉瘧相近蓋是別發一義者不宜援內經溫瘧為說矣內經稱冬傷於寒春必溫病而仲景則曰太陽病發熱而渴不惡寒者為溫病知是溫瘧之溫與溫病之溫實同其義詳論於傷寒論述義中瘧邪本在少陽故時嘔此證則熱邪熏胃者為甚故身無寒但熱更就骨節疼煩視之則猶有表邪在故加桂枝於白虎湯中以兼治表裡此證白虎清涼而少陽之邪亦解猶三陽合病用白虎之例但其脈如平諸注未瑩愚亦未曾遇此病末由知其理存而闕疑已瘧多寒者名曰牡瘧宋本外臺作牡瘧下蜀漆散同蓋其作牝者程衍道所意改存考蜀漆散方外臺引作蜀漆洗去腥雲母龍骨上三味等分搗節為散先未發前一炊以清酢漿水和半錢服臨發時更服一錢溫瘧者加蜀漆半分雲母炭火燒之三日三夜用按外臺似是千金一炊下有頃字按雲母龍骨性用注家所說似未明晰考之本草亦未見有治瘧之能竊以為此二味及牡蠣俱有解水結之功故與蜀漆相配能豁瘧痰也肘後方曰老瘧久不斷也未龍骨方寸七先發一時以酒一升半煮三沸及熱盡服溫覆取汗便即效千金翼曰療痰飲頭痛往來寒熱方常山一兩雲母粉二兩上二味為散熟湯服方寸匕吐之止若吐不盡更服並與此方其意相似又刺瘧篇次注曰先其發時真邪異居波隴不起故可治過時則真邪相合攻之則反傷真氣故曰失時蓋得此說而此方服法義益明矣輯義所引得效方文本出三因方丹溪纂要文本出保命集附外臺秘要方牡蠣湯外臺甘草炙上四味切以水先洗蜀漆三遍去腥以水八升煮蜀漆及麻黃去沫取六升內二物更煎取二升去滓溫服一升即吐勿更服則愈按此方吐而兼汗者張戴人法間有此類然愚嘗用治瘧夜間發及熱甚無汗者服後不吐而汗稍稍邪解就愈尤氏以謂外攻之力較猛者信矣柴胡去半夏加栝蔞湯外臺甘草下有炙字生薑三兩大棗下有擘字七味下有切字再作更日二服作日三千金名柴胡栝蔞湯用柴胡三兩大棗二十枚訛柴胡桂枝幹薑湯原注如熱是如神訛按此方宋人取而附此蓋有所據也今依治瘧如神之言殆不虛誣太陽下篇所用繫於太少並病而兼飲結者如此條徐注為核本於趙氏然瘧有痰澼積聚許仁則既有其說則此所用亦為兼治飲結者蓋其趣似異而實同者也中風歷節病脈證並治第五論一首脈證三條三疑七訛方十二首夫風之為病當半身不遂按凡形骸一節之氣閉而不仁者皆謂之痹今止云臂者蓋舉一隅爾寸口脈浮而緊按痹論曰皮膚不營故為不仁次注曰不仁者皮頑不知有無也診要經終論次注曰不仁謂不知善惡又成氏注平脈法曰仁者柔也不仁者言不柔和也為寒熱痛癢俱不覺知者也又曰不仁者強直而無覺也成說不確當與血痹篇及素問識診要經終論血氣形志篇互參又按徐氏曰至入腑腑邪必歸於胃胃為六腑之總司也於是風入胃中胃熱必盛蒸其津液結為痰涎氣壅隧道胃之支脈絡心者才有壅塞即堵其神氣出入之竅故不識人以上醫門法律文試觀俗做陳搏按住頸間兩人迎脈氣即壅逆不識人人迎者胃脈也則不識人之由胃氣壅不信然哉此說或有理蓋入腑入臟其證似輕重相錯然細繹其理不識人者一時昏塞暫時醒省即卒中閉證之謂舌難言口吐涎者其病深固必心神不收百治難效者也侯氏黑散俞本類聚曰能作自能寸口脈遲而緩按營緩衛緩二句是雙關文法上句是客詞下句是主詞對舉以為榮虛衛虛之辨緩字承上文猶言虛太陽下篇緊反入里緊字指邪而言是同語例榮緩言尺中緩者榮必虛衛緩言寸口緩者衛必虛衛虛故中風也榮緩一句本不幹中風而注家牽合為說未免踳錯風引湯除熱癱癇牡蠣各三兩原本諸本作二兩當改張氏千金方衍義曰風引者風淫末疾而四肢引動也按本草衍義作治風熱瘛瘲及驚癇瘛瘲幼幼新書作除熱去癲癇輯義癲字偶訛作癱醫壘元戎作除熱癲癇又按尤氏以此方為猛劑然其藥不過大黃石膏等而僅用三指撮則固無須顧慮矣三指撮即方寸匕余素問識病能論下引陶氏序例以證之千金治少小壯熱渴引飲下痢龍骨湯方於本方去乾薑牡蠣滑石白石脂紫石英加栝蔞根各二兩治下篩以酒水各五合煮散二合二沸去滓量兒大小服之按二合疑宜覆審防己地黃湯甘草一分趙本作二錢類聚作二分按據千金風眩門此係徐嗣伯方寸口脈沉而弱沉即主骨弱即主筋按此條不言痛者蓋省文也如水傷心注家就心主汗為解然汗出入水中恐不遽傷及心且歷節是筋骨間病固不幹心臟仍疑心字有訛或曰心主血脈傷心猶言傷血脈亦屬臆說又按歷節黃汗之辨尤氏為確徐氏曰黃汗重在腫歷節重在痛亦是徐更有詳說欠核今更審之曰黃汗出曰肢節疼痛曰發熱皆是二病所俱有然歷節之黃汗特在痛處曰歷節黃汗出是黃汗之汗洽於周身曰汗沾衣色正黃如柏汁是歷節之腫多止下部曰腳腫如脫曰獨足腫大是黃汗之腫及於遍體曰四肢頭面腫曰身腫是歷節之痛轉歷諸節其名可徵黃汗之痛必不轉歷曰骨節疼痛曰腰髖弛痛曰身疼重是且其胸中窒如痛久不愈必致癰腫等證實黃汗之所獨而歷節則無此瘀郁之態也但近時未見黃汗病亦未見歷節有黃汗出者姑就文義而論之已諸肢節疼痛身體白昍羸脈經作魁瘰類聚同輯義魁訛瘣趙原刻作魁按白昍羸恐以魁瘰為是爾雅枹遒木魁瘣注謂樹木叢生根枝節目盤結磈磊釋文瘣郭盧罪反邢昺曰魁瘣讀若磈磊據此魁瘰蓋爾雅之魁瘣謂疼痛之處盤結磈磊也正與病證相協磊亦作磥見玉篇其義可見耳竊疑爾雅魁瘣或魁瘰訛然前人未言及附記俟識者又玉篇𦢏𦞙腫兒是魁瘰之從肉者益足以徵前說蓋次條亦有身體羸瘦而魁瘰字所不習見故後人改作尫羸而其本義晦矣又按肢節疼痛身體魁瘰腳腫如脫三證疊言者亦猶麻黃湯身疼腰痛骨節疼痛之例且此云腳腫如脫次條云獨足腫大者言寒濕下注下部特浮其久不愈者往往變為鶴膝風亦濕滯所致耳又短氣與甘草附子湯證短氣同機本草玉石部陳藏器余云白師子主白虎病向東人呼為歷骨風政和本作江東人呼為歷節風桂枝芍藥知母湯方按趙氏曰分兩多而水少恐分其服而非一劑也三因方云每服四錢此說有理蓋此方九味都三十一兩當今秤十二錢五分八釐八毫水七升當今量七合七勺則當從防風湯改正為順烏頭湯方原本屈節作屈伸當改按此方比之桂芍知母湯其力更烈治歷節初起急劇證功效不可言黃耆亦以驅濕說見於前礬石湯按此方用之腳氣如痿軟引日者或見奏功衝心之證豈其所宜活人書稱腳氣用湯淋洗者醫之大禁而景岳全書詳論禁不禁之別當參附方古今錄驗續命湯輯義外颱風痱門載西州續命湯云云今更考外臺此西州二字宜刪去不識人當作不知人按此方即大青龍湯變方而尤氏所謂攻補兼施者已中風邪氣本輕但以血氣衰弱殊甚故招其侮大抵表候為內證所掩往往使人難於辨認蓋續命湯發表補虛對待為方實為中風正治之劑而推其立方之旨則亦足以明中風所因之理學者豈可不深味乎如晉唐諸家所增損其方頗夥茲不繁載千金三黃湯千金此方中分字皆作銖兩蓋是古式且六升作五升三服作二服腹作脹枳實一枚作六銖悸上有心字附子上有八角字近效方術附湯類聚作朮附子湯按前有頭風摩散後人仍附此方本不幹中風也崔氏八味丸按前有礬石湯等故後人附以此方蓋此方證即病邪淹留痹著少腹者故從緩治更有少腹不仁屬衝心之漸者實非此方所對也千金方越婢加朮湯生薑二兩當從諸本作三兩按此亦以治腳弱而附之也血痹虛勞病脈證並治第六論一首脈證九條當作十條方九首當作十首按醫門法律曰虛勞之證金匱敘於血痹之下可見勞則必勞其精血也魏氏以為血痹當編次於中風之後後人誤敘與虛勞同篇喻氏強牽入虛勞中可謂刻舟求劍二說未知何是程氏稍與喻同意問曰血痹病從何得之聖惠方盛重作充盛千金濇作澀在上更有澀字徐曰小字上該有微尺中三字此說難從按歷節血痹金鑑所辨不允歷節有風血相搏即疼痛如掣文則可知亦傷及血血痹有針引陽氣文則可知陽氣亦閉矣又徐沈程周並肌膚盛為句重字接下讀魏鑑重字連上句當考稻葉元熙曰重因趙本作重困似是賈誼新書民臨事而重困則難為上矣倉公傳為重困於俞忿發為疽此皆言累困也血痹陰陽俱微按傷寒論所謂脈之陰陽皆以部位而言然此條則自有寸口關上尺中文故金鑑以浮沉解之亦猶六難陰盛陽虛陽盛陰虛之意傷寒論多稱脈陰陽桂枝湯條不揭脈字而此無脈字故沈氏以陰陽營衛俱微釋之蓋此條陰陽義可兩通故輯義並二說而存之徐曰陰陽寸口人迎也尤曰陰陽俱微該人迎趺陽太谿為言並誤又聖濟尺中上補或字三因方曰脈當陰陽俱微尺中少緊身體如風痹狀黃耆桂枝五物湯方朱如桂枝湯本為太陽中風和營衛之要藥茲特去甘草之和緩而君以黃耆之峻補者統率桂芍薑棗由中達外俾無形之衛氣迅疾來復有形之營血漸次鼓盪則痹可開而風亦無容留之處矣按此說稍是然黃耆取之託陽逐邪不取峻補矣夫男子平人脈大為勞醫學綱目曰胗脈浮而大或大而弦皆為虛勞者蓋陽盛陰虛之症也暮多見之男子面色薄者重趙作里諸本同宜從鑑曰脈浮者裡虛也當是衍文誤矣按沈曰色乃神之旗營衛之標若面色薄者是白而嬌嫩無神乃氣虛不統營血於面也此說與魏氏異趣男子脈虛沉弦周此為勞傷元氣所以至此然則仲景即不言治法自當調以甘藥培中土以益元陽不待言矣若舍黃耆建中又何以為法耶按無寒熱又見短氣吐血瘀血及妊娠中俱言無外邪金鑑恐鑿瞑眩通用後條云目眩然則目瞑即目眩也男子字又出消渴及黃疸中宜參醫學綱目曰診脈虛微細弦為虛勞者蓋陰陽俱虛之症也晨多見之勞之為病其脈浮大鑑手足煩即今之虛勞五心煩熱陰虛不能藏陽也陰寒精自出即今之虛勞遺精陰虛不能固守也酸削不能行即今之虛勞膝酸削瘦骨痿不能起於床也按蘭室秘藏舉此條曰以黃耆建中湯治之此亦溫之之意也夫失精家少腹弦急按據巢源脈極虛芤遲以下當為一截看脈得諸芤動微緊先兄曰芤與微反動與緊反蓋芤動與微緊自是二脈則上文脈大為勞極虛亦為勞之意故下一諸字也按魏氏以為此上有假熱而下有真寒者其說頗辨然熟繹經文似不必上熱者天雄散方按此方白朮殊多故徐氏以為中焦陽虛之治沈氏同然天雄實為補下之品則其說恐未核要之配合之理殆為難晰已又朱氏曰然使真陰虧損亡血失精二方皆非其任矣須用八味腎氣丸法斯言殆然男子平人脈虛弱細微者周至盜汗則陽衰因衛虛而所虛之衛行於陰當目瞑之時無氣以庇之故腠開而汗若一覺則行陽之氣復散於表而汗止矣故曰盜汗也夫至盜汗而其虛可勝道哉人年五六十其病脈大者魏男子平人失精亡血之虛勞年少而體方柔脆故易至夭折年五六十感邪成痹之虛勞年老而體已堅硬故可以終其天年是虛勞而成痹終是經絡病虛勞而成失精亡血則為臟腑病矣經絡病可以引年臟腑病難於延歲也此仲景引虛勞之類以明虛勞也按沈氏曰虛陽上浮則脈大營衛不充於軀殼相循背之經隧曰痹俠背行朱氏曰大為虛陽外鼓之大而非真氣內實之大也三陽皆虛痹而不用並與尤魏異義又按馬刀陶隱居曰李云生江漢中長六七寸禹錫等謹按蜀本圖經云生江湖中細長小蚌也長三四寸闊五六分俠纓太素作俠嬰楊上善注曰頸前曰嬰也外臺引嬰作纓考段氏注說文纓冠系也賏頸飾也嬰繞也益知作纓者為是而俠纓者俠冠系之謂即頷骨下際至人迎兩旁也結纓必於頤下段氏可考脈弦而大弦則為減大則為芤按此條亦見於吐衄中按玉編芤苦候切集韻此有病脈二字徐氏脈訣云按之即無舉之來至旁實中央空者名曰芤徐氏不知何人隋志有徐氏脈經崇文書目有徐裔指訣此本於脈經未為當宜參先君子撰脈學輯要戴起宗脈訣刊誤曰芤草名其葉類蔥中空又本草綱目以為蔥一名俱未審何據成氏曰革者言其既寒且虛則氣血改革不循常度又方氏尤氏並有說俱未妥虛勞裡急悸衄按此條即虛勞之正證實屬斫喪太過虛火上亢者筋失所養故里急血脈衰乏故悸悸即動築驗之病者知其非心動血隨火上故衄寒盛於下故腹中痛下元不固而心神不寧故失精血道澀滯故四肢痠疼猶桂枝加芍藥生薑人參新加湯證身疼痛之理虛陽外泛故手足煩熱上焦液枯故咽乾口燥皆是莫不自陰虛所致陰虛故不與陽相諧是以用小建中湯和調陰陽蓋桂枝湯營衛均和而此方則倍芍藥專滋其陰以配於陽為虛勞正對之治矣又徐氏沈氏及汪纘功所論頗為精鑿文繁不錄宜閱汪說出吳醫匯講小建中湯方肘後凡男女因積勞虛損或大病後不復常若四體沉滯骨肉疼酸吸吸少氣行動喘惙或小腹拘急腰背強痛心中虛悸咽乾唇燥面體少色或飲食無味陰陽廢弱悲憂慘慼多臥少起久者積年輕者才百日漸至瘦削五臟氣竭則難可復振治之湯方即本方勞虛腰痛少腹拘急按此證陰虛頗重而無上炎之勢故純補下元而無取於建中和諧之法矣又按寇宗奭朱震亨王履李時珍並論此方之理王李俱駁寇氏然寇說似長今具列於左以備參考蓋茯苓澤瀉或引接桂附以達下焦如消渴所用是也或藉力桂附以通水淤如轉胞所用是也今如此條則引接通利俱兼取之矣五苓散之桂或以發表或以散寒藥與病對其方則一而其用有異者是仲景方法之妙致也寇氏本草衍義曰澤瀉其功尤長於行水張仲景八味丸用之者亦不過引接桂附等歸就腎經別無他意朱氏本草衍義補遺曰仲景八味丸附子為少陰之嚮導其補自是地黃後世因以附子為補誤矣附子走而不守取健悍走下之性以行地黃之滯可致遠亦若烏頭天雄皆氣壯形博可為下部藥之佐李氏本草綱目曰仲景地黃丸用茯苓澤瀉者乃取其瀉膀胱之邪氣非引接也古人用補藥必兼瀉邪邪去則補藥得力一闢一闔此乃玄妙後世不知此理專一於補所以久服必至偏勝之害也按此說本於王氏𣶮洄集王說文繁不錄按先兄紹翁曰牡丹皮之性較諸桃人虻蛭則不唯其力之緩若單與之難以潰堅破瘀蓋其為功唯是行血通經仍以配於桃仁大黃可增除滌之力合於當歸地黃阿膠等能引滋液和血之品而榮養陰分故參之補瀉之藥未有所礙復足以贊其不逮矣此說能闡前古之秘薯蕷圓方尤其用薯蕷最多者以其不寒不熱不燥不滑兼擅補虛去風之長故以為君謂必得正氣理而後風氣可去耳按本草薯蕷味甘溫主傷中補虛羸除寒熱邪氣補中益氣力長肌肉白字豆黃卷別不著其功然大豆則味甘平逐水脹除胃中熱痹傷中淋露黑字麴味甘大暖療臟腑中風氣調中下氣新補白蘞味苦平散結氣白字幼幼新書養生必用治風勞氣冷百疾薯蕷丸並治風眩背拘倦胸滿短氣羸瘦飲食少小兒泄利多汗發熱方即本方內不用棗濃煎棗湯空心嚼一丸日午再服有熱人即丸如桐子大空心日午米飲下二十丸止於三十丸酸棗湯方按此方釋意醫通為優輯義所引肝虛者三字剩本草黑字酸棗下云煩心不得眠補中益肝氣又茯苓之功本草經稱主驚邪恐悸孫真人曰治心煩悶及心虛驚悸安定精神蓋以其質重亦能鎮縋此方所取正在於此聖惠治虛勞煩熱不得眠臥黃芩散於本方去芎藭加黃芩羚羊角屑五勞虛極羸瘦腹滿按此條證即後世所謂勞瘵也據程注五勞虛極一句是一章題目羸瘦腹滿不能飲食是其證候食傷憂傷飲傷房室傷飢傷勞傷是其所因蓋有一於此諸因皆足以致經絡營衛氣傷而血脈凝積以致內有乾血遂為五勞虛極更有肌膚甲錯兩目黯黑二證俱為乾血之徵蓋其脈數蒸熱亦可概知也又按五勞言五臟勞蓋憂傷勞傷以勞心肝食傷飲傷飢傷以勞脾房室傷以勞腎而諸勞之極又必勞肺且此條所言不是五勞兼備者蓋言有一所傷而勞一臟以致經絡營衛氣傷遂為此病輯義引巢源思勞下刊脫心勞二字爾雅棤皵注謂木皮甲錯輯義引山海經文有訛脫曰羬羊其脂可以已臘注治體皴臘音昔又十四難損其肝者緩其中滑氏曰緩者和也百勞丸原出醫壘元戎曰許州陳大夫傳張仲景百勞丸緩中補虛程注甚當張說非是程氏曰婦人虛勞大半內有乾血男子亦間有之審其可攻而攻之則厥疾可愈魏氏曰此在婦人女子寡婦女尼因不月漸成虛勞者尤所宜投也大黃䗪蟲丸方大黃十分宜作二兩十二銖黃芩一兩諸本作二兩按本草經蠐螬味鹹微溫主惡血血瘀痹氣破折血在脅下堅滿痛月閉圖經云張仲景治雜病方大䗪蟲丸按黃字脫中用蠐螬以其主脅下堅滿也又䗪蟲條圖經云張仲景治雜病方主久瘕積結有大黃䗪蟲丸又大鱉甲丸中並治婦人藥並用䗪蟲以其有破堅積下血之功也醫學綱目曰結在內者手足脈必相失宜此方然必兼大補劑瓊玉膏之類服之幼幼新書嬰孺治小兒身體面目悉黃此是榮衛氣伏熱於內所為蠐螬丸方於本方去大黃桃仁乾漆加大棗按此證猶用本方為佳附方千金翼炙甘草湯宜參肺痿附方按此方仲景滋陰之正方而千金翼文出於仲景必有其徵故宋人取附於此也醫學入門稱一切滋補之劑皆自此方而變化之者其言為當蓋此方炙甘為君生薑大棗為臣地黃麻仁阿膠麥門為佐專以滋陰潤燥為務然懼其黏膩涼濕不利中土故人參桂枝為使更用清酒並以扶護元陽旁宣達諸藥之力與腎氣丸之桂附救腎中之陽其趣似異而實同如後世滋陰諸方徒裒合群隊涼潤之品誠非知制方之旨者矣徐氏曰後人只喜用膠麥等而畏薑桂豈知陰凝燥氣非陽不能化耶此言得之又按地黃此方及大黃䗪蟲丸腎氣丸等比之他藥分兩殊多蓋以體重之故不必君藥之謂宜參藥治通義方劑分量下小兒衛生總微論國老丸治瘦瘠虛羸惙惙少氣右以甘草炙焦黃杵末煉蜜和丸綠豆大每服五丸溫水下日三服一歲兒五丸以上者七八丸以意加減無時肘後獺肝散朱獺為陰邪之獸而肝獨應月增減是得太陰之正氣其性獨溫故宜於冷勞又主鬼疰一門相染者以陰入陰以邪逐邪同氣相求之義也按本草圖經云張仲景有治冷勞獺肝丸方又主鬼疰一門相染者取肝一具火炙之水服方寸匕日再崔氏治九十種蟲疰云云獺肝丸二方俱妙又聖惠方載冷勞證文繁不錄又按本草諸條圖經云肚主骨蒸熱勞血脈不行補羸助氣四季宜食張仲景有豬肚黃連丸是也豬肚黃連丸未詳其方當考余述魏氏曰失精於下者可成虛勞矣脫氣則成虛勞於上者焉秦越人之論虛損其言陽虛而陰盛損則自上而下一損損於肺二損損於心三損損於胃即仲景所謂脫氣之虛勞也其言陰虛而陽盛損則自下而上一損損於腎二損損於肝三損損於脾即仲景所言失精之虛勞也右節文念庭之說是也蓋五勞六極七傷其目雖殊要其指歸不出於陽虛陰虛二端且不啻不出於此二端而陰虛陽亢者實為居多今篇首既冠以男子二字而細檢各條大抵莫不屬陰虛矣小建中湯扶脾之劑也而其證則亦是上盛下虛其用此湯亦取於和陽就陰顧脫氣一條猶繫於陰虛陽隨衰者酸棗湯治火亢虛煩心神不寧者然則謂仲景所云虛勞者皆屬陰虛可乎如大黃䗪蟲丸證即骨蒸之類而肺痿一證是勞嗽之謂則今之虛損勞瘵者實不外於仲景所舉之數件矣愚撰藥治通義於補法下以建中腎氣二證對待為辨然今更考之其方則為補陽補陰之分而其證則不必胃虛腎虛之別舊見不免謬肺痿肺癰咳嗽上氣病脈證治第七論三首脈證四條三字四字並訛宜訂方十五首五當作六問曰熱在上焦者因咳為肺痿脈經千金又作數按喻氏曰肺癰屬在有形之血血結宜驟攻肺痿屬在無形之氣氣傷宜徐理徐氏沈氏周氏朱氏皆從此說然肺痿之病必損血液則以氣血立辨者謬矣又按口中反有濁唾涎沫蓋繫於該言稠痰白沫者本經所謂痰者非今之所謂痰次條曰多唾濁沫皂莢丸條曰時時唾濁桔梗湯條曰時出濁唾五臟風寒篇曰肺中風吐濁涕之類皆今之稠痰也蓋肺萎液燥而口中有唾涎故下反字也巢源虛勞凝唾候曰腎液為唾上焦生熱熱沖咽喉故唾凝結也此亦稠痰耳又脈反滑數反字難解稻葉元熙曰反於肺痿亡津液之脈或是仁存孫氏方曰詳觀肺癰肺痿二證實難治要之肺癰則間有可愈者亦須肺未穿故可救但肺痿罕有安者蓋其肺枯竭乾燥何由而得潤所以難愈問曰病咳逆何以知此為肺癰風則之則原本無之輯義偶衍宜刪按此條列呼吸不利咳口乾等候就風與熱以為分別然大旨不過云風壅釀熱以為此病耳又按熱過於榮熱之所過兩過字注未了當讀如詩江有汜不我過之過史記淮陰侯傳信常過樊將軍噲魏其侯傳灌夫有服過丞相扁鵲傳舍客長桑君過之類亦是又呂覽異寶五員過於吳注過猶至也義殆相同辨脈法曰熱之所過則為癰膿又按脈經平肺痿肺癰中所載出於本經之外者凡六條俱似非仲景原文姑拈一條於左曰問曰振寒發熱寸口脈滑而數其人飲食起居如故此為癰腫病醫反不知而以傷寒治之應不愈也何以知有膿膿之所在何以別知其處師曰假令膿在胸中者為肺癰其人脈數咳唾有膿血設膿未成其脈自緊數緊去但數膿為已成也肺痿吐涎沫而不咳者按稻葉元熙曰若服湯已渴者屬消渴是假設之辭與吳茱萸湯條得湯反劇者屬上焦也同例射干麻黃湯方按本篇用麻黃者四方宜為二義看注家皆謂其證內飲挾外邪故用麻黃髮其表是一義今驗肺脹證多是宿飲為時令觸動者而不必具表候則其用麻黃適取發泄肺中郁飲亦猶麻杏甘石湯之意是一義蓋勿拘一隅可也咳逆上氣時時唾濁按曾世榮活幼心書曰肺為五臟華蓋臥開而坐合所以臥則氣促坐則但寬蓋但坐不得眠得斯說而其理明矣皂莢丸方本草圖經云張仲景治雜病方咳逆上氣唾濁得政和作但坐不得眠皂角丸主之皂莢杵末一物以蜜丸大如梧子以棗膏和湯服一丸日三夜一服按本草皂莢條黑字云除咳嗽囊結又有孫尚藥治卒中風涎潮救急稀涎散蓋胚胎於此方千金治咳嗽胸脅支滿多唾上氣方白糖五分皂莢末一方寸匕上二味先微暖糖令消內皂莢末合和相得丸如小豆先食服二丸咳而脈浮者按水飲上迫脈必帶浮不必拘表證有無此二方證均是上焦蓄飲而以脈浮沉為別者蓋以勢之劇易及水飲上迫與內結之異耳注家特就邪為分殆非通論厚朴麻黃湯方按此方證系寒飲迫肺而無風寒外候故於小青龍湯中去桂枝以厚朴降逆為君其佐用杏仁亦猶桂枝加厚朴杏子湯之例況配以石膏其驅飲之力更峻澤漆湯方千金五合下有日三夜一四字無至夜盡字本草圖經引五合下有日三二字盡上有服字按澤漆本草白字稱味苦微寒主大腹水氣四肢面目浮腫黑字稱利大小腸蓋此方主證水飲內結故有須於利水之品也又按陳藏器曰千里水及東流水味平無毒主病後虛弱然則此方所用在熟淡不助內飲已又煮取五升溫服五合至夜盡是一日十服他方莫有此例千金似是然古之五升即今之五合古之五合即今之五勺以今推之日服五合未必為多豈東垣所謂在上者不厭頻而少之謂乎大逆上氣咽喉不利外臺無者字宜從麥門冬湯方稻葉元熙曰煎法據竹葉石膏湯溫服上恐脫去滓內粳米煮米熟湯成去米十二字外臺崔氏療骨蒸唇乾口燥欲得飲水止渴竹葉飲方於本方去人參加竹葉生薑又深師療肺氣不足逆滿上氣咽喉中閉塞短氣寒從背起口中如含霜雪語言失聲甚者吐血補肺湯方於本方去人參半夏加五味子乾薑款冬花桂心桑根白皮肺癰喘不得臥按葶藶下水疏肺壅故的治肺癰膿未成者也金鑑所引趙氏注據二注本繫於周氏補註醫心方引範汪方云葶藶熬令紫色治令自丸丸如彈丸大棗二十枚以水二升煮棗令得一升半去棗內藥一丸復煎得一升盡服之出支飲下本草圖經引亦作大棗二十枚按葶藶以彈丸為率故不須舉兩數大棗諸書皆作二十枚本經疑是錯寫或曰葶藶搗之則黏膩足以自丸不必補末蜜二字外臺必效療天行病後因食酒面肺中熱擁遂成咳不止於本方加桑白皮桔梗麻黃又崔氏療大腹水病身體腫上氣小便澀赤云云於本方加杏仁各搗搃和合平旦空腹服八丸云云幼幼新書簡要濟眾治小兒水氣腹腫兼下痢膿血小便赤澀方葶藶子半兩以棗肉和搗為丸施圓端效方名散腫丸雞峰普濟方曰著作雷道矩病吐痰頃間已及升余咳不甚面色黯郁精神不快兆告曰肺中有痰胸膈不利令服仲景葶藶大棗湯一服訖已覺胸中快利略無痰唾矣桔梗湯方原注血痹當喉痹然要是後人所續加按排膿散用枳實芍藥桔梗排膿湯於本方加生薑大棗是知桔梗有排膿之功但此間所有氣味輕淡不足以抵當大病彼土古時之品則恐不如此也聖濟治肺癰涕唾涎沫吐膿如粥麥門冬湯方於本方加麥門冬青蒿心葉小青龍加石膏湯方按麻杏甘石湯厚朴麻黃湯越婢加半夏湯小青龍加石膏湯皆麻黃石膏同用麻黃髮陽石膏逐水二味相藉而驅飲之力更峻不必取之於發表清熱蓋此四方緊慢稍異而其旨趣則大約相均要在臨證之際隨其劇易以為審處耳附方外臺炙甘草湯外臺桂枝二兩阿膠三兩炙大麻子仁半升大棗四十枚擘余同方後云上九味切以美酒七升水八升相和先煎八物取四升絞去滓內膠上微火烊銷溫服七合日三夜一按此方施之泛泛噁心者必增嘔逆溫溫液液蓋別有義未考又此方證與麥門冬湯證相近俱系滋養上焦之劑千金甘草湯按傷寒類要以單甘草湯治炙甘草湯證其理一致千金生薑甘草湯按此方亦治肺冷而萎猶是甘草乾薑湯之變方沈氏說欠當又而渴當作不渴為妥千金桂枝去芍藥加皂莢湯按此方桂枝去芍藥湯桂枝甘草湯之意取之扶胸中陽氣不和調營衛蓋亦屬肺冷之痿外臺桔梗白散按此條與桔梗湯證一而方異蓋所傳之本不同也然肺癰其膿稍成正氣隨衰峻猛之劑恐不能堪王氏所據豈得無錯乎千金葦莖湯按此方主證蓋在虛實之間又按蘇敬新修本草白瓜條曰別錄云甘瓜子主腹內結聚破潰膿血最為好腹腎脾內癰湯要藥本草以為冬瓜但用蒂不雲子也又今腸癰湯中之用俗人或用冬瓜子非也又案諸本草單云瓜子或云甘瓜子今此本誤作白字當改從甘也原本膿作濃藥作樂今從證類本草改此說可以確瓜瓣之為甜瓜矣醫心方張仲景方治三十年咳大棗丸方大棗百枚去核杏仁百枚熬豉百二十枚凡三物豉杏仁搗令相得乃內棗搗令熟和調丸如棗核一丸含之稍咽汁日二漸增之良按此疑雜病論之遺方仍附於此奔豚氣病脈證治第八師曰病有奔豚有吐膿師曰奔豚病以下脈經為別條宜從按欲死二字形容苦惱之狀而言與少陰篇吳茱萸湯條同語例奔豚湯方按此方證挾有熱邪故不取桂枝之溫而用黃芩生葛之涼且既有半夏故不再用茯苓芎歸芍藥三味以和其腹痛也傷寒總病論動氣在上不可發汗發汗則氣上衝正在心端李根湯主之於本方去芎藭生葛加桂枝人參茯苓桂枝加桂湯方傷寒論本方後曰本云桂枝湯今加桂滿五兩所以加桂者以能泄奔豚氣也發汗後臍下悸者茯苓下輯義桂枝二字偶脫余述奔豚一證多因水寒上衝故治法不出降逆散寒而注家概解以腎邪殆不免牽湊要坐不檢難經仲景之有異耳胸痹心痛短氣病脈證治第九師曰夫脈當取太過不及按責讀如平脈法肥人責浮瘦人責沉之責即求責之義胸痹之病喘息咳唾徐此段實注胸痹之證脈後凡言胸痹皆當以此概之但微有參差不同故特首揭以為胸痹之主證主脈主方耳周寒濁之邪滯於上焦則阻其上下往來之氣塞其前後陰陽之位遂令為喘息為咳為痛為短氣也陰寒凝泣陽氣不復自舒故沉遲見於寸口理自然也乃小緊數復顯於關上者何耶邪之所聚自見小緊而陰寒所積正足以遏抑陽氣故反形數然陽遏則從而通之栝蔞實最足開結豁痰得薤白白酒佐之既辛散而復下達則所痹之陽自通矣按周說為當但解數脈未免牽強姑存之栝蔞薤白白酒湯方按先兄曰說文曰酨酢漿也從酉㹢聲鄭玄注周禮四飲曰漿今之酨漿也陳藏器曰醋破結氣心中酸水痰飲胸痹心中痞氣本草枳實條圖經引與外臺相同類聚與趙本同枳實薤白桂枝湯方圖經引無枝字人參湯方人參條圖經引作治中湯白朮之白字無末附加減法一與傷寒論同仍不錄聖濟總錄曰胸痹之病其脈陽微而陰弦陽虛則知在上焦陰弦故令胸痹心痛古方用理中湯取緩其中氣陰證略例理中湯方後曰若胸痹脅下妨悶者加枳實半兩茯苓半兩御藥院方枳實理中丸治證與本條同於理中丸中加枳實茯苓附子按外臺崔氏療時行四五日大下後或不下皆患心中結滿兩脅痞塞胸中氣急厥逆欲絕心胸高起手不得近思與增損理中丸於本方中加栝蔞根枳實茯苓牡蠣正師胸痹人參湯之意其效甚著而王好古許國禎則移崔氏之方以治本證亦善於變通者矣茯苓杏仁甘草湯方醫心方醫門方治胸中痞塞短氣腷腷者或腹急痛方於本方加半夏生薑若氣不下加大黃檳榔取利為瘥橘皮枳實生薑湯方聖濟治風寒客於肝經膈脘痞塞脅下拘痛常欲蹈其胸上名肝著蹈胸湯方於本方加桔梗甘草薤白胸痹緩急者本草圖經引緩上有偏字原本諸本並無人字周胸痹緩急者痹之急證也寒飲上聚心膈使陽氣不達危急為何如乎故取薏苡逐水為君附子之辛熱為佐驅除寒結席捲而下又烏不勝任而愉快耶按周說似是苡仁之用能托鬱結況附子之雄烈相合為散比之前款諸方其力最峻足以奏功於燃眉之際焉蓋此緩急主在急字非或緩或急之謂史記倉公傳緩急無可使者袁盎傳一旦有緩急寧足恃乎遊俠傳且緩急人之所時有也俱是繫於一時切迫之謂此足以證焉焦循雕菰集羅浩醫經餘論序曰其論本草以神農經為主而證以南陽之方以薏苡主筋急拘攣故金匱胸痹緩急者主之用以健脾利濕則失其義心中痞諸逆心懸痛輯義肘後痛下有五字當作肘後作三字按諸逆程氏以病證言尤氏以病因言二說俱通魏氏曰諸逆兼有形無形之邪為言與尤意同伊澤信恬曰懸牽音義相同懸痛謂牽急而痛肘後可證又巢源有心懸急懊痛候千金養胎篇有腹滿懸急心下懸急之文亦並懸牽通用之徵也斯說為核三國志管輅傳有心中懸痛文九痛丸方原本諸本附子三兩下有炮字余述本篇題云胸痹心痛而首條則二證並論其他諸條皆為胸痹立方栝蔞薤白半夏湯心痛徹背不過言心胸痛甚桂枝生薑枳實湯心中痞前注猶以為胸痹心痛則僅烏頭赤石脂丸一方已故二證之辨難就而可考以臆測之胸痹其痛頗泛心痛其痛殊緊胸痹則病淺心痛則病深蓋二證中更自有輕重之別而其實似無大異同故胸痹之方足以治心痛至真心痛則固屬不治仲景略而不言殆以此也短氣一證病屬上焦故亦連類並及者歟腹滿寒疝宿食病脈證治第十趺陽脈微弦法當腹滿按此條證寒氣壅閉即大黃附子湯所主宜稱之實而言為虛寒者虛猶虛煩之虛非虛衰之虛蓋指無形之寒氣對水飲結聚有形之寒而言也虛煩義宜參傷寒論述義梔子豉湯條又程氏注稍不了病者腹滿按之不痛為虛按四十八難曰癢者為虛痛者為實外痛內快為外實內虛內痛外快為內實外虛楊玄操注曰輕手按之則痛為外實病淺故也重手按之則快為內虛病深故也重手按之則痛為內實病深故也輕手按之則快為外虛病淺故也凡人病按之則痛者皆為實按之則快者皆為虛也難經本為有痛立言而玄操注亦與此條相發又按陽明篇曰陽明病脅下硬滿不大便而嘔舌上白苔者可與小柴胡湯其意正與本條互發以見證雖似可下其白苔者邪未結實黃苔者始為熱實乃黑苔之為實可以知也且此條示以按腹知虛實以驗舌辨寒熱而後宜議攻下矣要之診察之大法莫不可從此條而擴充焉病者痿黃脈經胸中作胃中利上有下字寸口脈弦者巢源作寸口脈雙弦則脅下拘急其人澀澀而寒夫中寒家喜欠按中字金鑑為平聲讀其他諸注皆為去聲讀蓋此中寒家言素稟陰臟動易感寒者然則二說並存為佳又程氏謂寒鬱於肺經而為熱者似欠穩當靈口問篇曰陽引而上陰引而下陰陽相引故數欠又曰陽氣和利滿於心出於鼻故為嚏辨脈法曰客氣內入嚏而出之病腹滿發熱十日本草厚朴條圖經引云又厚朴七物湯主腹痛脹滿按此與千金同誤按金鑑曰飲食如故胃熱能消穀也存考厚朴七物湯方圖經引枳實上有大字桂枝之枝字無附子粳米湯方按弟子村田精一曰此方與白虎湯及加人參加桂二湯桃花湯並用粳米而其煮法不云至幾升蓋是以米熟為度不必期至幾升者恐非有脫文厚朴麻黃湯煮小麥熟去滓亦是一轍此可以備一說仍存之聖惠治寒疝心痛如刺繞臍腹中盡痛白汗出氣欲絕方於本方加川椒乾薑桂心厚朴三物湯方本草厚朴條圖經云張仲景治雜病厚朴三物湯主腹脹脈數厚朴半斤方後有腹中轉動更服不動勿服十字大柴胡湯方黃芩二兩原本諸本並作三兩腹滿不減傷寒補亡論曰減不足言者言不甚減也論言太陽發汗不徹不足言與此同意俗語所謂不濟事者是也心胸中大寒痛按出見有頭足上下句上上聲下去聲尤氏以出見有頭足為陰凝成象腹中蟲物乘之而動謂蜀椒乾薑溫中下蟲誤甚大建中湯方蜀椒去汗類聚無去字大黃附子湯方按此條證固屬寒實故大黃附辛相合成劑性味融和自為溫利之用如附子瀉心湯則其證表寒裡熱故別煮附子而功則各奏故同是附子大黃並用而立方之趣迥乎不均徐氏說未確切蓋溫利之劑實以桂枝加大黃湯及此湯為祖而溫脾等諸湯皆莫不胚胎於此二方矣赤丸方按本草丹砂黑字云作末名真朱寒疝繞臍痛沉緊類聚亦作沉弦按素問經脈別論真虛㾓心厥氣留薄發為白汗陰陽別論魄汗輯義誤寫作白汗又生氣通天論魄汗未盡魄白音通烏頭煎方宋本外臺熬作炮無去皮字白蜜二斤方後上以水三升煮烏頭取二升去烏頭內蜜煎令水氣盡云云不可一日再服作日止一服不可再也按程氏曰治下焦之藥味不宜多多則氣不專此言本於至真要大論補下治下制以急之說殆不免拘泥又按陶氏本草序例曰附子烏頭若干枚者去皮畢以半兩准一枚千金方治風歷節防己湯方後曰凡用烏頭皆去皮熬令黑乃堪用不然至毒人宜慎之據此宋本外臺不必是其不㕮咀豈嫌熟爛相和乎本草圖經云崔氏治寒疝心腹脅引痛諸藥不可近者蜜煎烏頭主之以烏頭五枚大者去芒角及皮四破以白蜜一斤煎令透潤取出焙乾搗篩又以熟蜜丸冷鹽湯吞下二十丸如梧子永除又法用煎烏頭蜜汁以桂枝湯五合解之飲三合不知加五合其知者如醉以為中病寒疝腹中痛逆泠手足不仁按烏頭煎證寒氣專盛於裡此條證表裡俱寒壅是所以有須於桂枝灸刺諸藥不能治是言病勢之劇套法不能得治不言灸刺諸藥之誤措徐氏以為是或攻其內或攻外邪氣牽制不服似欠穩貼輯義徐注為陽所客客字宜作容字烏頭桂枝湯方宋本外臺秋烏頭實中大者十枚去皮生用一方五枚按此方證最屬急劇治以單捷為妙桂枝湯外臺引作單桂汁蓋仲景舊面其出五味方者疑後人誤據千金烏頭湯詳出後所私攙注家皆仍原文為說覺未當周氏意似單桂汁然語意不了且其解欠妥仍不錄又按外臺於此方後注云範汪方同今檢宋本大書作範汪方云而直接桂枝湯仍知其舉桂枝湯者是範汪方文而非出仲景也聖惠治寒疝腹中痛手足逆冷身體疼痛針灸諸藥所不能任者宜服烏頭散方川烏頭大者十枚枝枝二兩上件藥搗細羅為散每服二錢以水一中盞入生薑半分煎至五分次入蜜半合更煎三兩沸令熟每以食前和滓溫服之聖濟治心腹卒脹痛桂心丸桂二兩烏頭一兩為末煉蜜和丸其脈數而緊乃弦按魏氏以此條脈為寒疝寒熱雜合之候其說似精猶不如尤氏以為寒疝陰盛之為優然此條該寒實諸證而為結蓋不特言寒疝也附方外臺烏頭湯按此方千金外臺所載並與前方文有異蓋本是別方林億等以前有五味方省之不錄也今從外臺拈出於下曰烏頭十五枚炮按千金云要略五枚芍藥四兩甘草二兩炙大棗十枚擘生薑一斤按千金作老薑桂心六兩上六味切以水七升煮五味取三升去滓別取烏頭去皮四破蜜二升微火煎令減五六合內湯中兩三沸去滓服一合日三間食彊人三合以如醉狀為知不知漸增忌海藻菘菜豬肉冷水生蔥深師同外臺柴胡桂枝湯宋本外臺作療寒疝腹中痛者醫心方範汪方治寒疝腹中痛小柴胡湯即原方外臺走馬湯肘後若唯腹大動搖水聲皮膚黑名曰水蟲巴豆九十枚去皮心杏仁六十枚去皮尖並熬令黃搗和之服如小豆大一枚以水下為度勿飲酒佳聖惠治乾霍亂不吐不利煩悶不知所為方巴豆一枚去皮心上以熟水研服之當快利三兩行即以漿水粥止立定余述按本篇先敘腹滿如痛者為實條厚朴七物湯厚朴三物湯大柴胡湯大承氣湯四條此其屬熱實者也如首條與腹滿時減復如故條此其屬寒實者也次敘寒疝如腹痛脈弦而緊條與大烏頭煎當歸生薑羊肉湯烏頭桂枝湯條皆以寒疝目之矣如瘦人繞臍痛與附子粳米湯大建中湯條亦是寒疝已其他諸條如寸口脈弦者即脅下拘急而痛與大黃附子湯證即虛寒從下上此寒氣聚著胠脅者也如病者痿黃證其位雖異亦是寒實也如中寒家二條即素稟陰臟外寒易觸者也蓋此三等既非腹滿亦不寒疝但以其屬寒仍牽聯及之且以與腹滿寒疝互相發明者已其脈數而緊一條即系寒實諸證之診以為總結矣然則二十條者學者宜區類而看如前注家往往湊合為說殆不免強會也問曰人病有宿食何以別之故下原本有知字宜補傷寒纘論曰所謂亦微而澀亦字從上貫下言浮大而按之略澀非澀弱無力之謂見浮大中按之略澀方可用大承氣下之設純見微澀按之不實乃屬胃氣虛寒冷食停滯之候又當從枳實理中助胃消導之藥矣豈復為大承氣證乎按此說似精然尺中既微何能兼大故張氏於微脈則略而不論殊屬模糊但其云澀非澀弱無力之謂者是矣然則微亦沉滯不起之微非微弱之謂也下利不欲食者俞本趙本欲作飲誤宿食在上脘當吐之周食既云宿決非上脘既非上脘何以用吐今言上脘又言宿食則必有痰載物不使得下則為喘為滿不言具見故一吐而痰與食俱出矣
