body:
  text: 卷下婦人妊娠病脈證並治第二十證三條按當作二條方九首婦人宿有癥病脈經首五句作婦人妊娠經斷三月而得漏下下血四十日不止胎欲動在於臍上此而妊娠三十字血不止作下血不止按瘀血癥痼必在臍下妊娠二三月墮者多其所害此云在臍上者竊不無疑或是訛字敢俟有識論定脈經胎在臍上更疑桂枝茯苓丸方朱服法甚緩以深固之邪止堪漸以磨之也按此方茯苓亦是引藥下導者說見於虛勞腎氣丸下芍藥取之通壅宜參傷寒論述義太陰病下此五味之所以相配也又按玄珠經通真丸婦人通經男子破血用大黃桃仁天水末一名益元散乾漆杜牛膝醫學綱目四卷中引正得此方之意婦人懷娠六七月脈弦發熱按惡寒尤氏為腹惡寒然猶似身惡寒存考師曰婦人有漏下者朱婦人下血大概由於衝任二經為病或無端漏下或半産後下血或妊娠下血下血雖異而源頭則一按此條漏下與半産後下血是客妊娠下血腹中痛是主三證並列以備參對也鑑程剖析不了朱氏為是但芎歸膠艾湯則足以兼三證而治之矣程氏引脈經考原書作今陽不足故令激經也又按魏氏曰假令妊娠而下血腹中痛此胞氣阻滯之故也胎氣何以阻以氣虛寒也氣虛寒則血必不足而凝凝則氣愈阻而作痛氣阻血凝則又內生虛熱血之凝者尚凝而余血遂漏不止甚則傷胎而動動而竟墜此胞中氣血因虛而寒因寒而阻因阻而凝因阻凝而熱因熱而下血因下血而傷胎墜孕遞及之道也此說太巧姑存之芎歸膠艾湯方醫心方産經云治妊身七八月腰腹痛胎不安汗出逆冷飲食不下氣上煩滿四肢痹強當歸湯方於本方去芎藭加生薑橘皮千金翼當歸湯治産後血留下焦不去於本方去阿膠艾葉加桂枝聖惠治産後下痢腹中㽲痛當歸散方於本方去阿膠加乾薑聖濟治妊娠因驚胎動不安當歸湯方於本方加人參不用清酒又治妊娠卒下血致胎不安少腹疼痛人參湯方於本方去芍藥加人參黃芩吳茱萸生薑不用清酒又治妊娠胎動有所下血腹脅疼痛宜服阿膠散方於本方去芍藥加赤石脂龍骨黃耆乾薑不用酒衛生家寶丁香膠艾湯治崩漏走下不止於本方加丁香末四分蘭室祕藏丁香膠艾湯治崩漏不止蓋心氣不足勞役及飲食不節所謂經漏少時其脈二尺俱弦緊洪按之無力其證自覺臍下如冰求厚衣被以御其寒白帶白滑之物多間有如屋漏水下時有鮮血右尺脈時微洪也於本方去甘草加丁香婦人懷娠腹中㽲痛先兄曰說文有雲建無㽲云雲建腹中急也從疒丩聲當歸芍藥散方朱芎歸芍藥足以和血舒肝苓朮澤瀉足以運脾勝濕此即後人逍遙散之藍本也按妊娠之常飲水動易停瀦是以內寒腹痛此方利水散寒以使胎氣盛實芎歸二味不特養血亦能散寒止痛古方往往見之此方所用或此意也抱朴子至理篇曰當歸芍藥之止絞痛先兄亦曰此方芍藥多用取之緩其痛與小建中之芍藥同趣趙說似迂曲妊娠嘔吐不止按張氏醫通全取趙氏乾薑人參半夏丸方醫心方僧深方治婦人妊身惡阻酢心胸中冷腹痛不能飲食輒吐青黃汁方用人參乾薑半夏凡三物等分治下以地黃汁和丸如梧子一服三丸日三今案極要方云各分稍加至十丸産經云人參丸神良幼幼新書嬰孺治小兒調中止痢去冷進食人參丸方於本方加茯苓蜜丸當歸貝母苦參丸方按張氏醫通本於趙氏本草序例雷公炮炙論云如小豆許者取重八兩鯉魚目比之葵子茯苓散方朱葵子通利諸竅稱能滑胎其疏泄血分可知而得茯苓之淡滲功專氣分者為之佐使水從氣分而去則胎自無虞按冬葵子本草白字曰主五癃利小便黑字曰療婦人乳難內閉白朮散方先兄曰千金半夏湯治腳氣上入腹方中用細辛與此治心煩吐痛者同趣又範汪旋覆花湯治胸膈痰結亦用細辛俱取其辛溫通氣散膈上寒飲也按千金治咳嗽胸脅支滿多唾上氣方酒一升半浸肥皂莢兩挺經宿煮取半升分三服七日忌如藥法若吐多以酢飯三四口止之此方嘔用醋漿其義一也婦人産後病脈證治第二十一論一首證六條按當五條方八首問曰新産婦人有三病按産後痙病其證治與上經所敘無別故更不論列鬱冒開在次條但大便難則不出其方然不出於脾約丸等潤燥手段也又按巢源婦人雜病中曰張仲景云婦人經水過多亡津液者亦大便難也恐繫於錯引本條者産婦鬱冒其脈微弱大便堅嘔不能食七字脈經作所以便堅者嘔不能食也先兄曰明理論云郁為鬱結而氣不舒也冒為昏冒而神不明也世謂之昏迷者是也此條不言發熱然後條有更發熱之語則其有熱者可知即為草蓐傷風明矣按此條文法稍近倒裝小柴胡湯主之一句本當在但頭汗出下其以先辨鬱冒之理故更於章末補出三句也冒家大汗出即是小柴胡相適之效亦猶少陽病振汗之比且以血虛下厥三句釋頭汗出之理所以産婦喜汗出者四句釋前條亡血復汗之理即血虛邪客之候陰陽乃復一句與冒家欲解必大汗出相應蓋喜汗出頭汗大汗三證不同宜分別看又按大便反堅反字對嘔不能食而言蓋嘔不能食是少陽證大便宜未至堅今産後液燥故大便反堅也本事方曰人平居無苦疾忽如死人身不動搖默默不知人目閉不能開口噤不能言或微知人惡聞人聲但如眩冒移時方寤此由已汗過多血少氣並於血陽獨上而不下氣壅塞而不行故身如死氣過血還陰陽復通故移時方寤名曰鬱冒亦名血厥婦人多有之宜白薇湯倉公散白薇湯白薇當歸各一兩人參半兩甘草一分炙水煎服倉公散瓜蒂藜蘆雄黃礬石煅等分少許吹入鼻中按二方並非本條證所宜姑附之又曰婦人産後有三種疾鬱冒則多汗多汗則大便祕故難於用藥唯麻子蘇子粥最佳且穩按冒家汗出乃復後但腸燥便祕者此粥為佳首條所謂大便難者亦或所宜病解能食七八日更發熱者按此條證徐朱以為食復魏周意亦然蓋沈氏與此諸家俱就能食而立說但尤氏曰病解能食謂鬱冒解而能受食也至七八日更發熱此其病不在表而在裡不屬虛而屬實矣是宜大承氣以下里此其意稍異存考産後腹中㽲痛千金治産後虛羸喘乏白汗出腹中絞痛羊肉湯方於本方加桂心芍藥甘草芎藭乾地黃聖惠羊肉地黃湯更加人參外臺許仁則産後更無他狀但覺虛弱欲得補氣力兼腹痛宜羊肉當歸湯方於本方當歸五兩生薑六兩加黃耆四兩若覺惡露下不盡加桂心三兩惡露下多覺有風加芎藭三兩覺有氣加細辛二兩覺有冷加吳茱萸一兩覺有熱加生地黃汁二合聖濟治産後血氣不利心腹急痛上下攻衝氣逆煩悶黃耆湯方於本方加黃耆白朮甘草人參下瘀血湯方趙與抵當同類但少緩爾按此方猶是抵當丸大陷胸丸之例宜云下瘀血丸今作湯字者蓋傳寫之訛耳方後煎字亦宜作煮字始合古義産後七八日無太陽證脈經更無切脈二字再倍下有其人二字不食作不能食按此條李注極允且據無太陽證一句考之則其有里證可以推知蓋是産後得邪邪氣下陷與血相搏者既有熱候亦有少腹堅痛與産後得胃家實者其證相似易錯故對待為辨也又膀胱猶言下焦不須深講産後中風發熱面正赤徐中風發熱頭痛表邪也然面正赤此非小可淡紅所謂面若妝朱乃真陽上浮也加之以喘氣高不下也明是産後太虛元氣不能自固而又雜以表邪自宜攻補兼施産後下利虛極徐凡治痢者濕熱非苦寒不除故類聚四味之苦寒不為過若和血安中只一味甘草及阿膠而有餘治痢好用參朮者政由未悉此理耳按虛極猶言疲憊軒村寧熙曰此證本自熱利故雖至虛極猶用白頭翁湯其加甘草阿膠者不啻補血益氣兼為緩中調腸之用陶氏云甘草通經解毒東垣云熱藥得之緩其熱寒藥得之緩其寒甄氏云阿膠止痢楊仁齊云痢疾多因傷暑伏熱而成阿膠乃大腸之要藥有熱氣留滯者則能疏導無留滯者則能平安據此諸說則增加之意可知虛閉並用阿膠乃是此意此說精確婦人雜病脈證並治第二十二論一首脈證合十四條按當作十條方十四首按當十三首婦人中風七八日續來寒熱按經水適斷四字宜為七八日上看蓋篇首四條既詳於傷寒論述義中茲不復贅程注至治有殊也全取傷寒蘊要婦人咽中如有炙臠焦循雕菰集羅浩醫經餘論序曰其論金匱以水症氣衝咽狀如炙肉證婦人咽中有炙臠為有形之邪阻無形之氣按梅核氣之名昉見直指方前人或謂為噎膈之漸蓋在男子往往馴為噎證女子則多不過一時氣壅痰結也半夏厚朴湯方醫心方醫門方療咽中如肉臠咽不入吐不出方於本方去蘇葉加橘皮外臺廣濟療心腹脹滿柴胡厚朴湯方於本方去半夏加柴胡橘皮檳榔聖惠治膈氣胸中妨悶痰壅不下食紫蘇散方於本方加枳殼柴胡檳榔桂心又治心腹脹滿痰飲不下食厚朴散方於本方加陳橘皮前胡檳榔婦人臟躁喜悲傷欲哭躁脈經趙徐沈尤朱注本並作燥誤婦人吐涎沫醫反下之心下即痞按據小青龍湯考之則此所謂涎沫亦即稠痰耳婦人之病因虛積冷結氣未多之未朱曰疑是寒字誤未勻原本諸本並作不勻宜改按徐氏曰婦人之病至胞門為一篇綱領因虛積冷結氣六字尤為綱中之綱謂人不虛則邪不能乘之因虛故偶感之冷不化而積氣熱則行冷則凝冷氣凝滯久則結結者不散也血遇冷氣而不行則經水斷絶然有微甚上下不同故曰諸程氏曰此條當分作三截看婦人之病必因於虛勞因於積冷因於結氣即結熱三者皆能為婦人諸經作病尤氏義同程氏而金鑑亦仍之今熟玩經文徐說似長但其解諸字恐非魏氏曰諸即之也為妥蓋此條以血寒積結下焦為主自寒傷經絡至非止女身十五句是客詞繫於舉上焦中焦之病以備下焦之參照者久成肺癰先兄曰癰當作痿字之誤也蓋上焦寒凝無為肺癰之理肺冷為痿甘草乾薑湯證是也脈經婦人病亦有咳逆嘔沫其肺成痿語魏又曰繞臍隱伏為少腹冷痛為奔豚為寒疝種種不同旁出者結於兩脅如臟腑相連邪高痛下而痛反在關元為下厥上逆之證沈氏以未多為未經多日之義非是徐氏曰奄忽四句為一段宜從蓋奄字上當存或字看金鑑以為痛甚之常狀似非厥癲即癲疾脈要精微論曰厥成為巔疾又曰來疾去徐上實下虛為厥巔疾是也嘔吐涎唾涎字韻下根氣街根字韻古書句中有韻韻未必在句尾見錢大昕十駕齊養新録王引之經義述聞輯義引巢源不通二字剩溫經湯方按此方半夏其旨難晰程氏謂以止帶下殊屬無稽徐氏曰下利已久脾氣有傷故以姜半正脾氣亦未核楊氏家藏方調經湯治衝任脈虛風寒客搏氣結凝滯每經候將行臍腹先作撮痛或小腹急痛攻注腰腳疼重經欲行時預前五日及經斷後五日並宜服之於本方去阿膠加五加皮熟乾地黃烏藥紅花沒藥帶下經水不利少腹滿痛徐帶下即前所謂此皆帶下非專指赤白帶也趙此亦因瘀血而病者經水即不利一月再見之不同皆衝任瘀血之病土瓜根者能通月水消瘀血生津液津生則化血也芍藥主邪氣腹痛除血痹開陰寒桂枝通血脈引陽氣䗪蟲破血積以消行之按趙注明備本綱意補或字蓋仍之也又千金方溫經湯主婦人小腹痛用茯苓芍藥土瓜仁薏苡仁其旨相似寸口脈弦而大按尤氏說三品功用本於趙氏趙又曰凡系帛皆理血血色紅用絳尤切於活血婦人陷經漏下按趙氏曰方雖不全見膠艾二物亦足以治之沈氏魏氏並以為阿膠乾薑二味俱難從婦人六十二種風按趙氏以為六十二種風盡以一藥治之明其非仲景法然原其立方之旨破血通經用紅花酒則血開氣行而風亦散矣紅藍花酒方本草圖經曰張仲景治六十二種風兼腹內血氣刺痛用紅花一大兩分為四分以酒一大升煎強半頓服之不止再服又一方用紅藍子一升搗碎以無灰酒一大升八合拌了暴令乾重搗篩蜜丸如桐子大空腹酒下十丸問曰婦人病飲食如故按此條之證本是下焦壅滯不得溺利者膀胱為之急脹而胞系遂至繚戾溺隨益閉以致煩熱不得臥而反倚息故用腎氣丸開其壅滯利其小便則膀胱寬豁而其系復舊也此證不必下元衰乏而其用此丸者專取之利水故云但利小便則愈又按慧琳一切經音義繚綟考聲云綟猶結紐也亦繚綟紛糾貌也云云徐氏曰了戾者其系紐轉也先兄曰盧文弨鐘山札記云了戾者屈曲旋轉之意許慎注淮南原道訓云抮了戾也郭璞注方言三軫戾也云相了戾也楊倞注荀子修身篇擊戾云猶了戾也少陰脈滑而數者陰中即生瘡脈經分為二條又曰少陰脈數則氣淋陰中則生瘡平脈法曰少陰脈微滑滑者緊之浮名也此為陰實其人必股內汗出陰下濕也胃氣下泄陰吹而正喧脈經此條前有一條曰少陰脈弱而微微則少血弱則生風微弱相搏陰中惡寒胃氣下泄吹而正喧婦人良方膏發煎治婦人穀氣實胃氣下泄陰吹而正喧陰中出血赤水玄珠曰令媳長卿之婦腹中微疼經行不流行喉痛四肢麻木作戰不知飢餓右脈洪大如菀豆以川芎香附麥芽山楂烏梅粉草桔梗酒芩防風荊芥白朮茯苓四劑而安次月經水大行十日不止以黃耆阿膠蒲黃各一錢白芍藥二錢粉草三分一帖而止此後但覺濁氣下墜屁從子戶中出以補中益氣湯加酒炒黃連調養而平小兒疳蟲蝕齒方幼幼新書引葶藶下有各少許三字臘日作臘月鎔上有和字趙注本不載此方魏附小兒疳蟲蝕齒一方不知何意載於篇末或有兒科之書闕略不全掛一漏百者乎雜療方第二十三按以下三篇二注本及朱氏亦不載柴胡飲子方按藥以貼稱宋以上所罕見說見於先教論撰醫賸中藥滓再煮見陶氏本草序例然僅繫於諸補湯所用長服訶黎勒丸方本草圖經引張仲景云長服方訶黎勒陳橘皮厚朴各三大兩搗篩蜜丸大如梧子每服二十丸至三十丸三物備急丸方千金三味各等分曰右皆須精新多少隨意先搗大黃乾薑下篩為散別研巴豆如脂內散中合搗千杵即爾用之為散亦好下蜜為丸貯密器中莫令歇氣本草圖經引作用大黃乾薑巴豆各一兩須精新好者搗篩蜜和更搗一千杵丸如小豆服三丸老少斟量之為散不及丸也云云每服大豆許三四丸七字按據千金方後用字句亦佳二字當在蜜和丸上蓋言即爾以散為便久貯蜜丸為佳雷公炮炙論云云如大豆許者取重十兩鯉魚目比之按徐氏曰此方妙在乾薑巴黃峻利寒熱俱行有乾薑以守中則命蒂常存且以通神明而復正性故能治一切中惡卒死耳程氏曰大黃蕩滌腸胃乾薑溫中散寒巴豆除邪殺鬼故主如上諸證愚意二說俱非蓋此方所主其證極暴極實僅有顧慮禍速反掌是以其治要在短刀直入咄嗟奏凱故巴豆辛熱峻下以為之君大黃為臣以輔峻下之用乾薑為佐以助辛熱之性三味相藉其功益烈為攻瀉諸方之冠所以能相抵當也聖惠治惡疰心腹痛如錐刀所刺脹滿欲死者硝石丸於本方加硝石附子又治暴癥氣攻心腹脹痛不欲飲食宜服巴豆丸方於本方加木香蓬莪朮又治卒死及感忤口噤不開者宜服此方即本方以棗瓤和圓如緑豆大以溫水下聖濟治小兒木舌腫脹滿塞口中三物備急丸方即本方如緑豆大每服五丸溫水下大便利為度尸蹶脈動而無氣靜而死肘後作靜然而死外臺同而作如而字當為如義讀按尸蹶即陽氣暴實凌轢陰血之病蓋中氣之類也說詳於扁倉傳匯考中當參救溺死方千金曰但埋死人暖灰中頭足俱沒惟開七孔治馬墜及一切筋骨損方鑑外浴以散其瘀內服以下其瘀斯得之矣按醫心方服石方中引張仲景者凡四道未知本經之遺否姑附載於左張仲景云解散發煩悶欲吐不得單服甘草湯甘草五兩切以水五升煮取二升服一升得吐即止張仲景方云黃芩湯治散發腹內切痛方支子二兩香豉三升黃芩二兩凡三物切綿裹以水九升煮取三升分三服以衣覆臥灸應有汗張仲景云半夏湯治散發乾嘔不食飲方半夏八兩洗炮生薑十兩桂心三兩橘皮三兩上四物以水七升煮取三升半分三服一日令盡張仲景方治寒食散大小行難方香豉二升大麻子一升破上二物以水四升煮二升八合去滓停冷一服六合日三禽獸魚蟲禁忌並治第二十四論辨二首合九十法按當八十六法方二十一首按當二十六首凡飲食滋味以養於生按服藥煉液言道家辟穀之流肝病禁辛心病禁咸醫說引食治通說云金匱要略方曰春不食肝夏不食心秋不食肺冬不食腎四季不食脾謂畜獸五臟能益人五臟春時木旺肝氣盛脾氣敗故不食肝食之則肝氣愈盛脾氣愈敗因成脾病則難治也或春月肝經受病明有虛證亦宜食肝以補之或春月肝氣太盛即宜食肺以抑之又云肝病禁辛心病禁咸脾病禁酸肺病禁苦腎病禁甘五味遞相剋制故禁之也或肝氣太盛因而生病亦宜辛味以制之更在心智變通不可全執定論他臟效此凡肝臟自不可輕啖自字疑衍巢源曰凡禽獸六畜自死者肝皆有毒不可食往往傷人其疫死者彌甚被其毒者多洞利嘔吐而煩悶不安豬肉落水浮者不可食按據前後條豬字當作諸字自死肉口閉者不可食之巢源曰凡可食之肉無甚有毒自死者多因疫氣所斃其肉則有毒若食此毒肉便令人困悶吐利無度是中毒六畜自死皆疫死巢源曰六畜者謂牛馬豬羊雞狗也凡此等肉本無毒不害人其自死及著疫死者皆有毒中此毒者亦令人心煩悶而吐利無度疫死牛肉食之令病洞下巢源食牛肉中毒候曰又因疫病而死者亦有毒食此牛肉則令人心悶身體痹甚者乃吐逆下利腹痛不可堪因而致者非一也治自死六畜肉中毒方程六畜自死必因毒疫苦能解毒黃柏味之苦者治食鬱肉漏脯中毒方按犬屎本草唐本注云白狗屎主疔瘡水絞汁服主諸毒不可入口者人乳功見下條生韭汁本草引孟詵云胸痹心中急痛如錐刺取生韭或根五斤先搗汁灌少許即吐胸中惡血知此方亦取湧吐治黍米中藏干脯食之中毒方程大豆能解諸毒故用以治治六畜鳥獸肝中毒方按六上似脫食字治食犬肉不消按心急字疑本草引梅師方作忽字巢源曰凡狗肉性甚躁熱其疫死及狂死者皆有毒食之難消故令人煩毒悶亂雞有六翮四距者先兄曰爾雅羽本謂之翮說文翮羽莖也鱠食之在心胸間不化巢源曰凡人食魚鱠者皆是便生冷之物食之甚利口人多嗜之食多則難消化令人心腹痞滿煩亂不安神巧萬全方治食物過飽不消遂成痞膈將死方馬牙硝一大兩碎之如無以朴硝代之吳茱萸半斤陳者上煎茱萸取濃汁投滓承熱服之久未轉更進一服立愈唐竇群嘗話在常州時食膾不消痞結悶甚諸藥悉不轉腹堅氣絶醫徐彥莊處得此方服乃瘥竇云微此殆絶果實菜谷禁忌並治第二十五按此篇合八十法方十八首今不言者蓋脫文也食諸菌中毒悶亂欲死方聖濟總録曰朽木生菌腐土生菌二者皆陰濕之氣蒸郁所生也既非沖和所産性必有毒若誤食之令人吐利不已心腹切痛甚者身黑而死十一月十二月勿食薤鑑薤味辛散走肺氣食之令人多涕唾葵心不可食傷人鑑葵心有毒背葉反常亦有毒不可食食躁或躁方按金鑑所解殆屬牽強蓋此方介於菜類方法中則亦當治菜毒方考醫心方引葛氏方云為食諸菜中毒發狂煩悶吐下欲死方煮豉汁飲一二升竊想葛氏所舉本是仲景原文而今作食躁或躁者繫於文字訛脫或是食菜煩躁四字之誤也今本肘後方偶缺此方然自有治諸菜毒方而其前後諸條概與本篇方法相同巢源曰野菜芹荇之類多有毒蟲水蛭附之人誤食之便中其毒亦能悶亂煩躁不安可以互證菜中有水莨菪按此雲中風即發狂之謂後漢書朱浮傳曰中風狂走春秋二時龍帶精入芹菜中按糖即餳字飴弱於餳故飴有膠飴餳有硬餳也輯義引釋名用李時珍所改當考原書及方言說文廣韻等
