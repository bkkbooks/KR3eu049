body:
  text: 題辭先教諭金匱輯義繫於晚年定本是以極其精核無須贅述惟不肖受讀既尚時有管見又諸家方論擴充經旨者其偶爾失載亦間有之趙以德衍義周揚俊補之題曰二注近代朱光被有正義之作俱出於先教諭下世之後並擷其粹皆標記在輯義上層不敢謂有裨學者然竊比之雞肋仍整録為編以供子弟參對云天保壬寅首夏丹波元堅纂金匱注解更有高世栻李彣李瑋西俱為醫宗金鑑所引又有盧之頤摩索金匱張志聰注黃元御金匱懸解戴震注李鈞注皆是先兄醫籍考所著録者盧氏黃氏學頗迂僻其存不存不足措念其他諸家惜未得見之況戴氏碩儒顧考證必精而其遺書中缺焉不收最可憾也又李炳字振聲號曰西垣苦金匱無善注乃撰金匱要略注二十二卷能抉其微見焦循雕菰集嘉慶中陳念祖著有金匱淺注十六卷金匱讀四卷見其神農本草經讀序趙開美本輯義所引系皇國重刊今得其原刻勘之間失其舊又朝鮮國醫方類聚所據蓋為宋元舊刻亦與今本互有異同今並校而揭之
