body:
  text: 卷中五臟風寒積聚病脈證並治第十一論二首脈證十七條方二首此三字輯義偶脫肺中風者冒而腫脹輯義腫訛作腹諸本皆作腫字肺中寒按評熱病論曰勞風法在肺下其為病也使人強上冥視唾出若涕又曰巨陽引精者三日中年者五日不精者七日咳出青黃涕其狀如膿大如彈丸從口中若鼻中出咳論久咳下曰使人多涕唾先教論曰古無痰字云唾出如涕謂吐黏痰也據此則濁涕即是黏痰非鼻涕之謂也肺死臟先兄曰此即浮芤之脈肝死臟先兄曰此雲浮之弱尤氏以為其徑直則一也不知何意心中風者按徐氏曰飢者火嘈也食即嘔吐邪熱不殺穀也尤氏曰心中飢食則嘔者火亂於中而熱格於上也二說似是又徐氏翕翕解未確弟子村田精一曰文選張平子思玄賦溫風翕其增熱兮注良曰翕熱兒衡曰說文曰翕熾也是翕有熱義此說是邪哭使魂魄不安者朱氏曰哭字疑誤陽氣衰陰氣衰衰字當作病字解此說謬脾中風者按李氏皮目解系臆說輯義過存之當刪徐氏曰金匱缺脾中寒然不過如自利腹痛腹脹不食可類推也甘草乾姜茯苓白朮湯方聖惠治腎著之為病身體冷從腰以下痛重甘草散方於本方加當歸三因苓朮湯治冒暑遭雨暑濕鬱發四肢不仁半身不遂骨節離解緩弱不收或入浴暈倒口眼喎斜手足嚲曳皆濕溫類也於本方去甘草加附子澤瀉桂心又苓朮湯治脾胃感風飧泄注下腸鳴腹滿四肢重滯云云於本方加厚朴青皮半夏草果宣明論腎著湯治胞痹小便不利鼻出清涕者即本方腎死臟浮之堅徐氏曰腎臟風寒皆缺然觀千金三黃湯用獨活細辛治中風及腎者而敘病狀曰煩熱心亂惡寒終曰不欲飲食又敘腎中風曰踞坐腰痛則知金匱所缺腎風內動之證相去不遠至寒中腎即是直中當不越厥逆下利欲吐不吐諸條余述本篇所謂中風中寒與傷寒中之中風中寒不同亦與半身不遂之中風自異如內經五臟風稍似相近而其證未必契合則知此別是一義不宜彼此牽湊且其於風與寒之旨注家不敢辨晰殊無可徵驗姑闕其疑已徐氏諸輩於脾腎二臟補出其遺又於肝著脾約腎著三方特論其趣要皆不免臆度也問曰三焦竭部趙嘗考傷寒論脈法中雲寸口脈微而澀微者衛氣不行澀者營氣不逮營衛不能相將三焦無所仰不歸其部上焦不歸者噫而吞酢按平脈法作酢吞中焦不歸者不能消穀引食下焦不歸者則遺溺正此之謂按魏氏曰師又言不須治久則愈者非聽其泄脫不為援救也言不須治其下焦但理其中焦可也朱氏曰便溺雖屬下焦而實中焦氣紊所致也故曰不須治久則愈謂不須治下焦但調理脾胃久當自愈耳二說缺穩亦姑存之師曰熱在上焦者因咳為肺痿按小腸受胃中水穀而分利清濁大腸居小腸之下主出糟粕而其下口為肛門因疑此條大腸小腸繫於傳寫互錯蓋言小腸有寒故泌別不職而水糞雜下其有熱者腸垢被迫而下出也大腸有寒則陽氣下墜故下重便血其有熱者毒結肛門故為痔也注家順文解釋竟不免強湊今大小易置其義始了但脈經以來諸書皆與今本同則姑記所疑以俟有道論定已李中梓病機沙篆曰仲景云小腸有寒其人下重便血以乾薑燒黑存性磁碗合放冷地上為末每服一錢米飲調下神效問曰病有積有聚有楫氣何謂也脈經楫氣並作系氣為穀氣下有夫病已愈不得復發今病復發即為系氣也十七字乃積也下有細一作結注文朱氏亦以諸積以下為別條朱凡陰寒凝結由漸而成者俱謂之積故曰諸積非有一例之證象也但有一定沉細之脈象故知其為積也病氣深沉不可不分上中下三焦以處之脈亦必從寸關尺三部以候之如寸口主上焦脈細而附骨知其積在胸中如胸痹之類是也出寸口上竟上也主積在喉中如痰氣相搏咽中如有炙臠等是也關上主中焦關脈細沉主積在臍旁按原文作關部主中焦而關有三候關中主積在臍旁云云殊屬無稽今按經文改訂如選臍腹痛之類是也微上關上積在心下如胃寒脘痛之類是也微下關積在少腹如少腹寒痛之類是也尺候下焦尺脈細沉積在氣衝如陰寒疝症之類是也按聚者為可治則積之為難治可推可知至楫氣則固屬易治然恐不得不治自愈矣又按十八難有寸關尺主胸以上膈以下齊以下之言又載診積聚法並與本條相發宜參又脈經載診五臟積條及診法七條今録其診法於左以備對考寸口脈沉而橫者脅下及腹中有橫積痛按此素平人氣象論文其脈弦腹中急痛按此據小建中湯條腰背痛相引腹中有寒疝瘕脈弦緊而微細者癥也夫寒痹癥瘕積聚之脈皆弦緊若在心下即寸弦緊在胃管即關弦緊在臍下即尺弦緊一曰關脈弦長有積在臍左右上下也又脈癥法左手脈橫癥在左右手脈橫癥在右脈頭大者在上頭小者在下又法橫脈見左積在左見右積在右偏得洪實而滑亦為積弦緊亦為積為寒痹為疝痛內有積不見脈難治見一脈一作脅相應為易治諸不相應為不治左手脈大右手脈小上病在左脅下病在左足右手脈大左手脈小上病在右脅下病在右足脈弦而伏者腹中有癥不可轉也必死不治脈來細而沉時直者身有癰腫若腹中有伏梁脈來小沉而實者胃中有積聚不下食食即吐痰飲咳嗽病脈證並治第十二按本篇咳嗽諸條本為懸飲支飲而設題目中不須有此二字疑是後人所誤添似宜芟去問曰夫飲有四何也按辻元嵩曰四飲云懸云溢云支皆就飲之情狀而命其名皆是虛字然則淡飲不應特用實字今據水走腸閒一證考之淡者蓋是水飲搖動之名淡與淡通靈樞邪氣臟腑病形篇心下淡淡恐人將捕之說文云淡水搖也從水詹聲並可以證焉宋玉高唐賦水淡淡而盤紆注淡淡搖動貌枚乘七發紛屯淡淡又湍流溯波又淡淡之注淡淡搖蕩貌馬融長笛賦頤淡滂流注水搖蕩貌搜神後記二月中蕨始生有一甲士折食一莖即覺心中淡淡欲吐皆淡淡相通之徵也以其居四飲之首故取以題篇目從來注家不知痰之為淡又不知其本水搖之謂而轉為津液為病之總稱故其所解釋皆與經旨不協矣此說有理伊澤信恬亦有說其意相同且曰淡淡諸書多相通用而痰用淡字絶少但醫心方引小品云白微湯治寒食藥發胸中淡外臺作痰酢乾嘔煩又引效驗方云斷膈丸治胸間有淡水並是淡痰之正字此言亦是嵩又曰初月帖淡悶與乾嘔對言蓋虛煩之謂又按懸飲據巢源懸字似懸痛之謂巢源又有懸癖候曰咳唾則引脅下懸痛所以謂之懸癖然以他三飲例之則猶宜從前注為懸掛之義為穩又成氏注平脈法沉潛水蓄支飲急弦曰蓄積於內者謂之水蓄故脈沉潛支散於外者謂之支飲故脈急弦程氏蓋襲此誤又按篇中支飲自有二證其一上迫胸中其一壅聚心下其胸中證多實結宜疏蕩而亦有泛漫宜消導者其心下證多泛漫宜消導而亦有實結宜疏蕩者學者須熟審經旨勿敢混看焉水在心先兄曰堅者心下堅實也築者築築然悸動也千金可證短氣者飲抑往來之氣故也尤注似迂水在肺先兄曰涎沫即咳而吐痰也水在腎醫碥曰心當作臍夫心下有留飲按此支飲之類證已蓋初非四飲外別有留飲伏飲也留飲者脅下痛引缺盆按已亦甚也輒已即輒甚經典中往往有此義胸中有留飲沈此明支飲甚則變為溢飲矣蓋留飲乃氣鬱水積故謂脈沉者有留飲也膈上病痰滿喘咳吐先兄曰滿喘二字疑倒置魏諸症皆伏飲內寒逼陽在外之候按病痰二字當作之病為是此條亦是支飲之類證其人振振身瞤劇即與苓桂朮甘湯之身為振振搖真武湯之身瞤動振振欲劈地其機相同夫病人飲水多必暴喘滿朱本亦無喜字朱此明飲邪有實有虛而所致異途脈亦迥殊也飲水多二句是言飲之驟致者食少飲多四句是言飲之積漸者如兩手皆見弦脈夫弦則為減當以正氣虛寒論治設一手獨弦明是病氣有偏著偏著者為實邪則又當以攻邪論治矣皆大下後虛五字疑屬衍文節録按喘短氣是支飲所有悸是痰飲支飲所俱有又太陽中篇曰發汗後飲水多必喘又曰太陽病小便利者以飲水多必心下悸傷寒例亦論飲水多為喘稻葉元熙曰脈雙弦者寒也二句是客脈偏弦者飲也句是主主客對舉為以脈斷病之法朱氏謂為衍文者謬此說為是肺飲不弦焦循雕菰集羅浩醫經餘論序曰其論金匱以咳則其脈弦與弦則衛氣不行如肺飲不弦肺飲二字句謂肺飲之輕者有不弦但短氣而不咳其弦則衛氣不行而咳矣則重矣非謂肺飲無弦脈也心下有痰飲程心下有痰飲即支飲也病人脈伏其人欲自利按此證亦是心下支飲而病邪盤結者與木防己湯十棗湯證其機稍近而其位不均甘遂半夏湯方宋本外臺芍藥一兩又云三枚按趙氏曰甘草緩甘遂之性使不急速徘徊逐其所留入蜜亦此意也此程氏所本又按此方四味都以枚稱徑長之品恐難以附子烏頭之枚例之豈甘遂芍藥亦以如指大准之乎考醫心方引小品方云人參一枚者以重二分為準此似宜以為率蓋二分即古稱之十二銖今之二釐九豪也但半夏在別例耳脈沉而弦者懸飲內痛按內痛諸家無解豈脅肋內有痛之謂乎玉機真藏論有內痛引肩項文十棗湯方本草圖經載本方云病懸飲者亦主之胡洽治水腫及支飲澼飲加大黃甘草並前五物各一兩棗十枚同煮如法一方又加芒硝一兩湯成下之按聖濟芫花湯原於此方醫壘元戎曰胡洽方治支飲澼飲於十棗湯中加大黃甘草同煎服之故以相反之劑欲其上下俱去也病溢飲者當發其汗按二湯證治徐氏以挾熱伏寒為辨恐未必是蓋其別在從病之輕重分藥之緊慢而二方俱不過用以散表水也膈間支飲其人喘滿本草圖經引深師作其脈沉緊不愈作乃愈復發下有汗至三日四字無與字木防己湯方宋本外臺石膏雞子大十二枚碎綿裹本草引深師木防己二兩石膏二枚雞子大綿裹木防己加茯苓芒硝湯方本草無茯苓澤瀉湯方聖惠治心下有水不散是胸中痰飲不能下食宜服此方於本方加半夏生薑和劑解暑三白散治冒暑伏熱引飲過多陰陽氣逆霍亂嘔吐小便不利臟腑不調噁心頭暈並皆治之於本方加白茯苓各等分每服半兩重水一盞姜五片燈心十莖煎八分服支飲胸滿者按此條證據尤鑑二說是支飲而兼胃實者故有須於承氣也輯義引鑑飲滿即支飲訛小半夏湯方趙半夏之味辛其性燥辛可散結燥可勝濕用生薑以制其悍孫真人云生薑嘔家之聖藥嘔為氣逆不散故用生薑以散之外臺文仲療腳氣入心悶絶欲死半夏三兩洗切生薑二升半上二味內半夏煮取一升八合分四服極效聖惠治五噎胸膈咽喉不利痰逆食少方半夏七枚小者湯洗去滑搗細羅為散都為一服以濃生薑湯調服之患年多者不過三服瘥魏氏家藏方殊勝湯去痰涎進飲食於本方加甘草防己椒目葶藶大黃丸方徐先服一小丸起尤巧所謂峻藥緩攻也魏何云一丸疑誤臨病酌加為妥按魏說似是然赤石脂丸亦梧子大服一丸仍兩存之卒嘔吐心下痞本草圖經引云又主嘔噦谷不得下眩悸小半夏加茯苓湯按此亦心下支飲證也小半夏加茯苓湯方衛生家寶竹葉湯治熱吐翻胃及傷寒遍身發熱冷吐於本方加竹葉葉氏録驗方半夏湯治肩臂痛即本方假令瘦人臍下有悸按此證即首條所謂痰飲之類已臍下有悸與腸間漉漉稍同其轍而用五苓散者亦溫藥和之之意也五苓散方按小島尚質曰澤瀉一兩一分當作五分始合古義此方傷寒論一以銖兩稱卻是後人所改此說確又按外臺黃疸引傷寒論作澤瀉五分益足以徵矣按本證無發汗之理方後多飲暖水汗出愈一句蓋繫於以傷寒論有此文而此亦附見者尤氏說似牽會朱氏集驗方附子五苓散治翻胃吐食大附子一隻取空入五苓散在內炮熟上為細末用薑湯下何元壽方附方外臺茯苓飲按此亦支飲證而與苓桂朮甘湯小半夏湯等證其機相近者也咳家其脈弦按據次條此亦膈間支飲也又沈氏析此以下九條題云咳嗽曰此與肺脹癰痿之咳嗽不同而肺脹癰痿乃陡起之證此因飲蓄相搏而咳所以另立一門也此說似是然本篇以咳嗽有因水飲者而連類及之非為咳嗽立門也夫有支飲家咳煩胸中痛者朱夫曰有支飲家則支飲之由來舊矣乃因循失治病氣變遷有加無已始也咳逆今且壅閉而煩矣始也倚息不得臥今則胸中宗氣為飲邪搏結有似兼懸飲之痛矣夫病久邪盛似可卒死乃仍遷延至百日或一歲者只以支飲之邪本實邪也邪實宜攻不嫌過峻主以十棗湯所謂有病則病當之也按趙程意與徐同沈鑑意與魏同朱氏所解或可備一說仍表出之又尤氏曰其甚者榮衛遏絶神氣乃亡為卒死矣否則延久不愈至一百日或一歲則猶有可治為其邪瘥緩而正得持也亦通久咳數歲其脈弱者可治魏又有久咳數歲飲之留伏也久矣證之成患也深矣診之脈弱者久病正虛是其常也久病而邪亦衰是其幸也可以於補正氣寓逐水飲之法治之徐徐可收功也故曰可治若夫診其脈而實而大而數則正虛而邪方盛欲補其正有妨於邪欲攻其邪有害於正可決其死也然此亦為治之不如法者言耳苟能遵奉仲景以扶陽益氣為本以溫中散寒清熱散邪為斟酌以導水於二便宣水於發汗為權宜何遽致於必死乎咳逆倚息不得臥按此即首條支飲證也蓋其人上焦素有停飲今時氣所觸相搏犯肺以為此證故與小青龍湯雙解表裡然非敢備諸般表候也青龍湯下已多唾口燥按下已者服畢也多唾者青龍之功著而飲豁之徵猶今之患支飲者及其欲愈必吐稠痰唾亦稠痰也宜參肺痿及前篇肺中寒條口燥者亦飲去之徵與渴同機續後三條俱舉藥驗此證亦即是已而咳止息平義寓其中矣此下脈證非為青龍湯而發以其飲所在不特上焦亦瀦於中下而更或有所挾今服湯之後支飲雖散他證嗣見者也寸脈沉尺脈微者魏氏曰寸脈沉者支飲有窠囊欲去之而不能盡去也尺脈微者正陽虛於下而陰寒之氣斯厥逆而上奔也此解似佳唯尺脈微豈為血虛而現乎手足厥逆者陽素不盛今為飲遏住所致與瓜蒂散之厥其情相近氣從小腹上衝胸咽者下焦之水上迸也手足痹者其人血虛故也其面翕熱如醉復下流陰股者胃中有熱被飲迫動或升或降也小便難者膀胱不輸也時覆冒者即是心下支飲之故而有時失升也先證三焦俱有水加以血虛與胃熱然其所急特在氣衝故先用桂苓五味甘草湯以抑逆散飲此方比之苓桂朮甘湯有五味而少術彼以胃為主而此猶兼肺故用五味以利肺氣比之苓桂甘棗湯彼飲在下而此飲在上也咳滿即止而更復渴趙服湯後咳滿即止三變而更復渴沖氣復發以細辛乾薑乃熱藥服之當遂渴反不渴支飲之水蓄積胸中故也按此節當以至為熱藥也為一截看咳滿即止是姜辛之功著然藥勢燥胃故為渴而下焦之水亦隨發動此際更宜苓桂五味甘草湯者意在言外矣服之以下是接上文治其咳滿句言服之咳滿即止當發渴而反不渴者為心下有支飲也渴反止趙氏注為反不渴讀程氏亦然宜從此支飲與青龍證不同所謂冒者即前條時覆冒之加重者也復內半夏者所以驅水飲止嘔逆也水去嘔止其人形腫者尤血虛之人陽氣無偶發之最易厥脫麻黃不可用矣杏仁味辛能散味苦能發力雖不及與證適宜也按水去即心下之水去故嘔止是半夏之功著矣然內水外溢以為形腫故治猶遵前法而表水非麻黃不能驅除蓋杏仁之與麻黃其性雖有緊慢之別而其功用則稍相均以其人血虛故以此易彼耳其人遂痹者前段手足痹也厥者亦即前段手足厥逆倘得麻黃以亡其陽則更甚也血虛者尺脈微之應也此無救逆之法顧證既至此則宜別處固陽救液之藥非前方加減之所治矣若面熱如醉按此上四條如雲治其氣衝而承以沖氣即低之類其文上下相應特此條自為起端故程氏尤氏以為別證然其治仍守上方則知亦接上來矣面熱如醉者即前段所謂面翕熱也其初胃熱未長故不敢為意今蓄飲未散而胃熱增劇故加大黃以利之徐氏所謂雖有姜辛之熱各自為功而無妨者實得其理矣千金方衍義引趙氏今二注本無考又按以上六條皆設法備變者也蓋病有證候錯雜或陸續變替乃不可不就其所急而為之處療者是此諸條之所以設而使人知圓機之妙者已唯所敘諸證未必一人兼備亦未必非一人兼備且所處之藥皆著其功如更發他證者是不必藥之所致要不過假此數端以示為治之次第也其初則時氣觸動而其次則下焦水逆次則肺飲復動次則中焦飲遏次則水氣外溢於是水飲之情狀纖悉無遺而加以兼虛挾熱可謂密矣先渴後嘔為水停心下徐飲有久暫不同此云先渴後嘔渴必多飲從無嘔證而忽於渴後見之其為水飲無疑矣故曰此屬飲家暫時傷飲也鑑水停心下中焦部也中焦屬胃故不止病悸短氣而亦病嘔也病悸短氣者是水停胃外從膈下而上干於胸也病嘔者是水停胃內從胃中而上越於口也余述許學士稱平生病膈中停飲覺酒止從左邊下漉漉有聲脅痛飲食殊減十數日必嘔數升酸苦水後揣度之已成癖囊如潦水之有科曰不盈科不行水盈科而行也清者可行濁者依然渟滀蓋下無路以決之也是以積之五六日必嘔而去稍寬數日復作脾土也惡濕而水則流濕莫若燥脾以勝濕崇土以填科曰則病當去矣於是悉屏諸藥一味服蒼朮三月而疾除云云愚以為許氏所患即支飲中一證其所辨說殊為精核蓋如苓桂朮甘湯澤瀉湯小半夏及加茯苓湯茯苓飲等證皆是支飲之自脾土失權而致者即所謂癖囊也癖囊之名今世多唱之者而少知其實為支飲者又莫識支飲之證得許氏之言而其理更明者故愚今表而論之癖囊本作澼囊出千金痰飲中消渴小便利淋病脈證並治第十三小便利徐沈周尤朱作小便不利宜從寸口脈浮而遲按巢源以此條收之虛勞候中可以確金鑑說矣趺陽脈浮而數證治要訣曰中消消脾脾氣熱燥飲食倍常皆消為小便男子消渴小便反多余述按本篇之敘真消渴僅此二證即消中與下消也古今録驗雖分為三其實亦不過脾腎二臟之病已渴之為候必自胃熱而上焦之熱必止咽燥所謂口燥不渴者皆為膈有熱而胃無熱者言然則仲景不及上消者其意殆可見也迄至宋金諸哲以三消配之三焦衛生家寶簡易方直指方保命集等是也近日和田泰純嘗疑其說不能無理但內經有肺消膈消之名而厥陰病既有消渴蓋為胃津竭乏遂及胸膛者乃不得言必無上消證不敢臆定以俟識者渴欲飲水不止者沈此亦非真消渴也按尤氏曰熱渴飲水水入不能消其熱而反為熱所消故渴不止文蛤味鹹性寒寒能除熱咸能潤下用以折炎上之勢而除熱渴之疾也此亦一說姑存之小便不利者有水氣按朱氏以為上焦有熱下焦有寒因渴而小便不利誤矣此證之渴即下焦蓄水而升騰之氣液失常之所致栝蔞根不啻生津液亦能行水氣觀柴胡桂枝幹薑湯此方治飲結說見傷寒論述義及牡蠣澤瀉散而可見也此方用治小便閉宜用腎氣丸而其人厭泥戀者甚驗危氏得效方附子散治小便不通兩尺脈俱沉微乃陰虛故也用綿附子澤瀉各一兩燈心七莖水煎服亦此意也若渴欲飲水口乾舌燥者按此條既出陽明篇中則猶是似非真消渴然以為中消證治亦所無妨豬苓湯方豬苓去皮茯苓阿膠滑石澤瀉各一兩上五味以水四升先煮四味取二升去滓內膠煬消溫服七合日三服按此方輯義偶脫今照原本録補水氣病脈證並治第十四論七首脈證五條方九首按此數目並有訛當考師曰病有風水有皮水脈經其腹如鼓下注曰如鼓一作如故不滿癰膿輯義誤寫作癰腫諸本皆作膿字按風水亦外證胕腫其不言者蓋系省文醫通以為脫文似非金鑑以從上腫從下腫辨風水皮水恐失拘執輯義胕程讀為跗程當作鑑又皮水其腹如鼓云云宜從巢源及脈經注改正為順正水徵以水熱穴論水脹篇則此證亦必腹滿今不言者亦系省文金鑑言胸滿自喘者非是要之風水皮水以表邪有無為辨正水石水以喘不喘為別其他證候皆宜類推也醫通引經是大奇論水熱穴論評熱病論陰陽別論然錯綜顛倒頗加改易學者宜考原文又按內經之風水為腎虛招風以為水氣遂變正水者仲景之風水指邪水專鬱於表者而言其證稍異又正水蓋水腫之正證水熱穴論曰故水病下為胕腫大腹上為喘呼不得臥者標本俱病故肺為喘呼腎為水腫肺為逆不得臥分為相輸俱受者水氣之所留也水脹篇曰水始起也目窠上微腫如新臥起之狀其頸脈動時咳陰股間寒足脛瘇腹乃大其水已成矣以手按其腹隨手而起如裹水之狀此其候也俱是正水之謂耳雞峰普濟方曰病腫者皮膚緊急腫滿無文沒指若目下微腫如臥蠶之狀及足脛皆腫小便不利其人喘急脈沉大而疾此由脾腎虛弱腎虛水不能蓄水氣揚溢脾胃虛則不能制水水氣流散於經絡經絡水病故能腫滿謂之正水此說甚核足以相徵矣至石水則考之巢源其水沉凝不行亦不上泛殆近水鼓者也雞峰方又以為腹脹如鼓按之堅硬腹中時痛謂之石水繞臍堅硬腹不痛者謂之鼓氣是以痛不痛為別恐非確論又有治石水用防己椒目葶藶大黃丸治驗文繁不録宜閲巢源又有毛水候亦是皮水又有大腹水腫候亦即正水並宜相參又三因皮水據巢源處以五皮散脈浮而洪浮則為風相擊徐沈朱作相系非惡風以下八字聖濟總録引作惡風者為風水按此條風強氣強二證是客風氣相擊證是主宜分別看汗出乃愈專屬風水而言不統前二證趙氏曰風者外感之風也氣者營衛之氣也所謂氣強者衛因熱則怫鬱停而不行氣水同類氣停則水生所聚之液血皆化水也程氏曰氣者水氣也形盛於外為氣強內經曰津液充郭其魄獨居即氣強之意也魏氏曰氣者水氣即濕邪也濕邪挾風邪作熱於表也尤氏曰風天之氣氣人之氣是皆失其和者也風氣相搏風強則氣從風而侵淫肌體故為癮𤺋氣強則風從氣而鼓湧水液故為水風氣並強兩相搏擊而水液從之則為風水汗之則風去而水行故曰汗出乃愈尤注與金鑑相發最為穩貼身癢多屬表虛特桂麻各半湯證以不得小汗出身癢即是表郁豈此條之類乎平脈法曰脈浮而大浮為風虛大為氣強風氣相搏必成隱疹身體為癢癢者名泄風久久為痂癩林億等注眉少發稀身有干瘡而腥臭也寸口脈沉滑者中有水氣擁上諸本有微字輯義偶脫按靈樞論疾診尺篇視人之目窠上微癰如新臥起狀其頸脈動時咳按其手足上窅而不起者風水膚脹也此本條所原先兄曰擁臃同腫起也太陽病脈浮而緊按身腫而冷狀如周痹程氏屬之黃汗恐佳痛在骨節亦是黃汗尤說為是趺陽脈當伏今反緊寒字句疝瘕宜接腹中痛讀趺陽脈當伏今反數徐此二條言水病人別有宿病人各不同當從趺陽脈與其舊疾見證別之尤趺陽雖系胃脈而出於陰部故其脈當伏今反緊者以其腹中宿有寒疾故也寒則宜溫而反下之陽氣重傷即胸滿短氣其反數者以其胃中有熱故也熱則當消穀而小便數今反不利則水液日積故欲作水夫陰氣傷者水為熱蓄而不行陽氣竭者水與寒積而不下仲景並舉二端以見水病之原有如此也按諸家以趺陽脈伏為病脈尤氏特以為平脈而其注義亦暢仍表出之更推尤意此欲作水一句總括二條亦頂胸滿氣短來或曰此二條前條是客不過舉其有寒者以為照對實無干水病後條是主示水之因熱生者此說亦有理姑附存之又按趺陽平脈貴沉實不貴浮露故尤氏以伏為平脈辨脈法曰趺陽脈遲而緩胃氣如經也其意一也但後條有寒水相搏趺陽脈伏語義相矛盾當考又辨脈法曰趺陽脈微而緊緊則為寒微則為虛微緊相搏則為短氣夫水病人目下有臥蠶按靈樞無目下微腫如蠶之文趙氏錯引蓋目下如臥蠶者色黃晶腫如新臥起者眼胞上龐然虛浮其證自異方書中或有曰有若臥蠶才起之狀者謬矣師曰寸口脈沉而遲或曰推他文例趺陽脈伏一句疑衍存考蔣示吉醫宗說約曰有血分症婦人先經水斷絶而後四肢腫滿小便不通此血瘀水道以通經為主宜小調經散問曰病者苦水面目身體四肢皆腫脈之上脈經有師字是趙此水病脈之不言水反言胸中痛等病當時記其說者以為異非異也是從色脈言耳按脈之不言水反言胸中痛二言字沈氏屬之病者本于徐氏趙氏則屬之醫師殊覺妥協蓋此病者洪腫如以常情則當言其所苦與治之所急皆在水而師反舉胸中痛等證以為言故人疑而設問也脈經作師脈之不言水語意最明太陽上篇問曰證象陽旦條及脈經中並有同語例宜相參又關元即泛稱下焦之名亦見厥陰篇及婦人雜病中又醫以為留飲而大下之句言醫誤認脅下急痛等證以為懸飲支飲之屬錯用十棗等湯蓋當時未至身腫而程氏謂見標證面目身體四肢皆腫云云而大下之者殆未為當又胃家虛煩之煩即太陽下篇吐之內煩之煩又按脈經引四時經云土亡其子其氣衰微水為洋溢浸漬為池走擊皮膚面目浮腫歸於四肢愚醫見水直往下之虛脾空胃水遂居之肺為喘浮注云肺得水而浮故言喘浮又巢源傷寒咳嗽候曰水停心下則肺為之浮肺主於咳水氣乘之故咳嗽又水腫候中曰肺得水而浮浮則上氣而咳嗽也蓋得斯說而浮咳之義始晰矣何氏醫碥曰水氣喘者水氣逆行肺氣得水而浮觀浴河者水浸至胸則喘可見風水惡風一身悉腫按沈以為風多水少之證恐拘先兄曰續似續陸續之續汗常出而不止又前第四條曰其人不渴汗出即愈此為風水存參評熱病論論風水有口乾苦渴證越婢湯方按藥有性有用方之既成或取其性或取其用如此方則石膏得麻黃之溫發但存逐水之用相藉以驅水氣石膏逐水本草不言然仲景用之驅飲者不一而足加朮湯則麻石之功與前方同而術與麻黃相藉走外之力稍勝矣性用諸義詳開於拙著藥治通義中防己茯苓湯方按此方繫於發表利水相兼之劑防己黃耆俱逐外水義具於濕病防己黃耆湯下須互參越婢加朮湯方按此方與次方所主之證蓋在輕重劇易之別不必拘有熱無熱矣甘草麻黃湯方千金翼麻黃湯主風濕水疾身體面目腫不仁而重方即本方重覆日移二丈汗出不出更合服之慎護風寒皮水用之良祕傳經驗方走馬通聖散治諸風濕及傷風傷寒頭疼並治疔瘡一切腫毒手足疼痛風痹不仁即本方炒微黃碾為細末每服三錢用水鍾半鍋內滾一大沸涼溫服蓋被暖不透風汗出為度仍要護慎風觸遂無重復水之為病其脈沉小屬少陰按少陰即與傷寒少陰病同義繫於表虛寒之謂其用麻黃附子甘草湯取之溫發沈氏說雖巧猶未免牽湊厥而皮水者醫心方張仲景方青龍湯治四肢疼痛面目胕腫方麻黃半斤去節去末細辛二兩乾薑二兩半夏洗凡四物切以水八升煮得二升一服止又又云治脾胃水面目手足胕腫胃管堅大滿氣不能動搖桑根白皮湯方桑根白皮切二升桂一尺生薑三顆人參一兩凡四物切以水三斗煮取桑根竭得一斗絞去滓內桂人參生薑黃飴十兩煮之竭得七升服一升消息更服今案本草桂一尺重半兩為正按右出其第十卷治通身水腫方中未知果是本經之遺否姑附於此余述按本篇首敘四證而篇中特舉風水皮水不及正水石水其論治法有云可下之有云當利小便有云當發汗今考篇中殊詳於發表之方而至攻下滲利之藥則缺而不出豈皆是後人之所刪難抑仲景之引而不發者乎黃汗之病先兄曰此條當為五節讀首二句概稱黃汗之證也而下曰歷節曰勞氣曰生惡瘡者以其與黃汗相類而實不同舉以示之也歷節必兼寒邪故周身發熱尤氏所舉第四條文彼注屬之皮水與此抵牾然其屬黃汗者為是桂枝去芍藥加麻黃細辛附子湯方外臺引深師名附子湯主證與本條同甘草炙麻黃去節三兩細辛三兩附子冠大字大棗有擘字煮麻黃下有再沸二字方後云仲景傷寒論名桂枝去芍藥加麻黃細辛附子湯趙本作桂姜草棗黃辛附子湯方心下堅大如盤本草圖經引無邊如旋盤四字宋本外臺飲癖門引備急亦作枳實術湯按上條與此條其病俱在內與外體浮腫者不同今編在本篇者未詳其解疑是痰飲篇中所錯也巢源氣分候曰夫氣分者由水飲搏於氣結聚所成氣之流行常無壅滯若有停積水飲搏於氣則氣分結而住故云氣分醫學綱目曰氣分謂氣不通利而脹血分謂血不通利而脹非脹病之外又別有氣分血分之病也蓋氣血不通利則水亦不通利而尿少尿少則腹中水漸積而為脹但氣分心下堅大而病發於上血分血結胞門而病發於下氣分先病水脹後經斷血分先經斷後病水脹也按樓氏此說湊合水分為言殊屬刺繆枳朮湯方外臺兩見並作白朮三兩本草引同無白字外臺引備急及本草亦水五升作水一斗侶山堂類辨曰金匱要略用枳朮湯治水飲所作心下堅大如盤蓋胃為陽脾為陰陽常有餘而陰常不足胃強脾弱則陽與陰絶矣脾不為胃行其津液則水飲作矣故用術以補脾用枳以抑胃後人不知胃強脾弱用分理之法咸謂一補一消之方再按局方之四物湯二陳湯四君子湯易老之枳朮丸皆從金匱方套出能明乎先聖立方大義後人之方不足法矣按胃強脾弱補脾抑胃並似迂曲外臺文仲徐王枳實散宜春秋服消腫利小便兼補療風虛冷脹不能食方枳實半斤炙桂心一斤茯苓白朮各五兩為散酒服方寸匕日三服加至二匕千金月令主結氣方白朮枳殼炒上等分搗篩蜜丸如梧子大空腹飲下二十五丸聖惠治癖結不能飲食心下虛滿如水者枳實散方於本方加半夏生薑水煎又治膈氣心胸間痛方於本方加神麴各一兩為散不計時候熱酒調下一錢又治飲癖氣分心下堅硬如杯水飲所作桂心散方於本方加桂心細辛附子檳榔姜棗用枳殼水煎服按此嚴氏枳朮湯祖方又治飲癖心下堅大如杯時復疼痛宜服此方於本方加桂心生薑百一選方治一切浮腫水氣亦可治於本方如吳茱萸茯苓生薑水煎奇效良方加味枳朮湯治氣為痰所隔心下堅脹名曰氣分枳殼白朮辣桂紫蘇陳皮檳榔桔梗五靈脂木香各一分半夏茯苓甘草各二分每服二錢水二盞生薑三片煎至一鍾去滓食前溫服黃疸病脈證並治第十五論二首脈證十四條方七首按當作六首寸口脈浮而緩尤脾臟瘀熱而色黃脾者四運之軸也脾以其所瘀之熱轉輸流布而肢體面目盡黃矣故曰瘀熱以行按平人氣象論曰緩而滑曰熱中邪氣臟腑病形篇曰緩者多熱平脈法曰緩者胃氣實實則谷消而水化也又傷寒論曰傷寒脈浮而緩手足自溫者是為系在太陰太陰者身當發黃合此諸義觀之則知是緩為胃熱而浮緩為發黃之診又知浮則為風之風即熱氣外熏之謂傷寒論有此例非邪氣中表之義又知緩則為痹之痹字蓋是疸字之訛始與文義相葉緩疸煩三字韻黃行二字韻顧以其訛作痹後人不辨遂補痹非中風一句也再按痹非中風一句推他文例當是風疸相搏四字此愚弱冠時說極知臆妄然痹字遂難解注家循文解釋不免牽強仍姑存録以俟識者倉公傳曰風疸客脬難於大小溲溺赤趺陽脈緊而數趙女勞疸惟言額上黑不言身黃省文也後人雖曰交接水中所致特其一端耳按先兄曰尺脈浮為傷腎趺陽脈緊為傷脾二句插入以對示女勞疸谷疸二證之脈此不承食即為滿句亦不接風寒相搏句注家與上下相連為解殆覺踳謬又陰被其寒諸注以陰為腎臟似失當特尤氏曰谷不消而氣以瘀則胃中苦濁濁氣當出下竅若小便通則濁隨溺去今不通則濁雖下流而不外出於是陰受其濕陽受其熱轉相流被而身體盡黃矣朱氏曰是太陰雖被寒鬱而鬱久化成之濕熱流禍膀胱並是又按女勞疸注家以為腎熱其說誠是蓋人斫喪太過精液虧乏則腎中之陽必亢極營血為之郁黷遂為發黃也又此證小便自利魏氏曰陽虛氣降無所收攝節制也金鑑曰膀胱急小便利下焦虛也腹滿如水狀脾腎兩敗故謂不治也亦是一說蓋此證本是下虛故其初小便不禁久而真元閉絶小便不利遂至腹如水狀也又按舒氏傷寒論集注曰酒中有熱有濕均足為患因其本氣而患之本氣虛寒者本不患熱惟患其濕真陽素旺者不患其濕而患其熱此本於張介賓酒泄說然其意少異蓋酒疸之證舒氏所謂不患其濕而患其熱者也酒疸心中熱按此上條脈浮者之謂似不必與懊憹有微甚之別酒疸下之久久為黑疸按據巢源千金諸疸皆久為黑疸雖黑微黃蓋通言之不特自酒疸變者變作桃皮色亦本於巢源尤氏以女勞疸對言然女勞疸亦尺脈浮身盡黃不必脈沉身純黑師曰病黃疸按此條言黃疸有因火劫得者然此病多自濕得之而其證有二端尤氏謂非內兼濕邪則熱與熱相攻而反相散者恐失其當如傷寒火逆條兩陽相熏灼其身發黃風溫被火微發黃色陽明病被火必發黃俱不內兼濕邪者腹滿舌痿黃按趙氏曰黃疸之黃深實熱之黃痿黃之黃淺虛熱之黃當考疸而渴者其疸難治按趙氏曰疸即疸也單陽無陰此說本於聖濟未確蓋發黃用疸字見玉機真藏論胃熱用疸字見平人氣象論此疸疸相同之明徵也又刺瘧篇胃瘧者令人旦病也太素旦作疸注疸音旦內熱病也谷疸之為病寒熱不食沈濁氣內壅所以心胸不安不安者即懊憹熱痛之類也茵陳蒿湯方趙氏曰蓋茵陳湯治熱結髮黃佐梔子去胃熱通小便更以大黃為使蕩滌之雖然治疸不可不分輕重如梔子柏皮湯解身熱發黃內熱之未實者麻黃連翹赤小豆湯治表寒濕內有瘀熱而黃者大黃硝石湯下內熱之實者梔子大黃湯次之茵陳湯又次之按梔子大黃湯治上熱此方治胃熱其病位本不同且此方大黃二兩彼則一兩此方其劑大彼則劑小可知此方力重於彼喻氏亦以此為輕誤矣梔子柏皮湯麻黃連軺赤小豆湯二方傷寒論述義有詳說茲不贅又按尿如皂角汁狀此濕去之徵故曰黃從小便去也幼幼新書吉氏家傳治小兒身體黃及小便黃眼白睛黃即是疸也宜此方於本方加朴硝黃家日晡所發熱而反惡寒外臺疸作疸本草圖經引亦疸作疸其腹脹作腹臚脹滿按發熱而反惡寒金鑑說為是尤注難從又按此證本是虛因而更有水蓄腹滿故云難治蓋仲景書其稱難治者在傷寒論則七見在本經則五見大抵謂病寒熱相錯虛實互呈其治不得純一有所顧慮者宜深味焉余嘗著虛實論既有詳說録在藥治通義中宜參硝石礬石散方圖經引作硝石熬黃礬石燒令汁盡二物等之合祕絹篩大麥粥汁和服方寸匕日三重衣覆取微汗病隨大小便去小便正黃大便正黑也大麥用無皮者按此方用大麥粥其理與石膏配粳米相同藥性論云硝石君惡曾青畏粥本草綱目曰緑礬燥濕化涎利小便消食積故脹滿黃腫瘧痢疳疾方往往用之其源則自張仲景用礬石硝石治女勞黃疸方中變化而來聖濟治赤白痢礬石丸白礬四兩硝石一兩半搗為末云云用米醋浸炊餅心丸如梧桐子大每服十丸空心米飲下魏氏家藏方硝礬圓治暗風癇病年深者於本方硝石半兩白礬一兩枯加赤石脂二兩火煅為細末糯米粥為丸如緑豆大每服十五丸食後溫水下日進三服一日一次發者服之半月永除根本酒黃疸心中懊憹首句外臺作酒疸者按此上條脈沉弦者之治也梔子大黃湯宋本外臺梔子七枚擘枳實破水漬炙香豉一升綿裹分溫三服作去滓溫服七合日三服諸病黃家但利其小便按桂枝加黃耆湯證即濕邪表郁者蓋與濕家身色如熏黃有陰陽之別諸黃豬膏發煎主之按趙氏既引傷寒類要以證此條之為血燥然其說冗雜不核仍不採入豬膏發煎方聖惠治黃疸耳目悉黃食飲不消胃中脹熱此腸間有燥糞宜服此方上煎煉豬脂五兩每服抄大半匙以蔥白湯頻服之以通利為度沈氏尊生書曰有服對證藥不能效耳目皆黃食不消者是胃中有干糞也宜飲熬豬油量人氣稟或一杯或半杯日三次以燥糞下為度即愈黃疸病茵陳五苓散主之按此條不言何疸殆是谷疸之輕證否則濕邪內郁所致乎黃疸腹滿小便不利而赤按此條不言何疸蓋是谷疸之最重者也自汗出為裡熱蒸迫之候諸注以為表和者非是蓋此證一屬裡實故舉表和二字以徵自汗之非表邪也大黃硝石湯方千金硝石作芒硝難從宋本外臺煎取二升半去滓內硝石更煎取一升先食頓服按硝石礬石散及此方不用芒硝而用硝石者蓋以芒硝潤品不宜濕熱故取於火硝之燥且利焉繇是觀之則今之醫治陽明病於承氣湯中換用硝石者坐於不深研經旨矣黃疸病小便色不變欲自利朱此黃疸中之中氣虛寒者小便色不變非時下無壅熱並見虛寒之象乃自利腹滿而喘是濁邪橫逆清氣不運使醫者誤認腹滿而喘為實熱反以寒藥除之益致胃敗而為噦且以小半夏湯溫通上焦以止逆除噦而後漸次調理脾胃可也按陽明篇曰陽明病不能食攻其熱必噦所以然者胃中虛冷故也以其人本虛攻其熱必噦正與此條同機聖惠方治陰黃小便色不變欲自利而不利腹滿而喘者必噦噦者宜服小半夏湯方於本方加人參葛根男子黃小便自利趙男子黃者必由入內虛熱而致也反見小便自利為中下無熱惟虛陽浮沉為黃耳按沉疑泛字故與治虛勞之劑補正氣正氣旺則營衛陰陽和而黃自愈矣按趙說是蓋女勞疸初起之證治也先兄曰上條有手足中熱膀胱急少腹滿諸證而此特舉小便自利者使人推知其他也今與虛勞篇相參其膀胱急少腹滿者尤氏所謂陽病不與陰和則陰以其寒獨行為裡急為腹中痛而其實非陰之盛者若身體盡黃手足中熱亦尤氏所謂陰病不能與陽和則陽以其熱獨行為手足煩熱而實非陽之熾者陰陽不相和諧外生虛熱而所謂黃病非土色外呈之候其用小建中湯者意在使陰陽相就而寒以溫熱以和也附方瓜蒂湯外臺延年祕録療急黃心上堅硬渴欲得水吃氣息喘粗眼黃但有一候相當即須服此瓜蒂散吐則瘥方於仲景原方中去香豉又許仁則方有用瓜蒂丁香赤小豆搗篩末以新汲水和一方寸匕與服者千金麻黃醇酒湯外臺疸作疸本草傷寒類要引張仲景傷寒論文稍與外臺同二升半作半升下有去滓二字余述按黃疸之病有陰陽二證更有濕勝燥勝之異今考經文酒疸陽而屬燥者也故治主清涼女勞疸陰而屬燥者也故初治從和中而末治須潤導谷疸有陽有陰其陽屬濕熱治在疏蕩其陰屬寒濕治要溫利後世以茵陳附子並用者即寒濕之治已如茵陳五苓散證豈濕熱發黃之輕者乎此諸黃者皆病之屬裡者也如桂枝加黃耆湯證濕熱鬱表亦陽黃之類已此他傷寒論中發黃諸條不一而足皆與本篇互發學者宜參互詳審焉驚悸吐衄下血胸滿瘀血病脈證治第十六按胸滿是瘀血中一證不宜於篇題中有此二字從刪為是按驚悸心疾血心之所主此其所以合為一篇歟寸口脈動而弱趙心者君主之官神明出焉不役形不勞心則精氣全而神明安其宅苟有所傷則氣虛而脈動動則心悸神惕精虛則脈弱弱則怔忡恐悸蓋驚自外物觸入而動屬陽陽變則脈動悸自內恐而生屬陰陰耗則脈弱是病宜和平之劑補其精氣鎮其神靈尤當處之以靜也朱因物所感則為驚神虛怵惕則為悸分言之似有動靜虛實之別而驚則未有不悸悸則未有不易驚者其原流自屬一致仲景獨取寸口以動而弱三字繪出驚悸之脈象而仍分疏之曰何以知其為驚以其脈之厥厥動搖也何以知其為悸以脈動之中而自軟弱也則脈之動而弱必兼見則症之驚與悸亦相因而生此自然之理也師曰尺脈浮目睛暈黃衄未止鑑浮脈主陽主表若目睛清潔主陽表病也目睛暈黃主血脈病也蓋以諸脈絡於目而血熱則赤血瘀則黃今目睛黃暈知其衄未止也若暈黃去目睛慧了知其衄已止按尺脈以候血分金鑑似是暈黃去目睛慧了其脈靜者可推而知也周禮注鄭司農云輝謂日光氣也輝即暈字釋名曰暈卷也氣在外卷結之也日月皆然病人面無血色無寒熱按面無血色無寒熱是該衄下血吐血而言徐氏曰煩咳條不言脈浮弱二字貫之也又金鑑曰脈沉當是脈浮脈浮當是脈沉文義始屬必傳寫之訛金鑑說不妥蓋脈浮是血逆之候沉弦是血虛之徵夫吐血咳逆上氣按聖惠方腳氣門曰上氣脈數不得臥者死蓋病屬虛及實中挾虛者見此脈證必為不治夫酒客咳者必致吐血醫心方引醫門方也字作難療二字病人胸滿唇痿舌青趙是證瘀血何邪致之耶內經有墮恐惡血留內腹中滿脹不得前後又謂大怒則血菀於上是知內外諸邪凡有所摶積而不行者即為瘀血也積在陰經之隧道不似氣積於陽之肓膜然陽道顯陰道隱氣在肓膜者壅脹顯於外血積隧道惟閉塞而已故腹不滿因閉塞自覺其滿所以知瘀血使然也按脈經所謂當汗出不汗出為瘀血亦出外臺小品芍藥地黃湯主療及巢源傷寒諸候中且芍藥地黃湯方後云其人喜忘如狂者加地黃三兩黃芩三兩其人脈大來遲腹不滿自言滿者為無熱但依方服不用黃芩也右據宋本録千金加地黃作加大黃為是末句作但依方不須有所增加無不用黃芩也字據此此條證即芍藥地黃湯所主也又按唇痿之痿本是萎字即失色之謂金鑑以痿瘁釋誤病者如熱狀煩滿按而渴疑不渴訛蓋血熱諸條有但欲漱水證不敢言有渴驗之病者亦必不欲咽且而不互錯往往見之宜考輯義水氣篇徐氏曰瘀血症不甚則但嗽水甚則亦有渴者蓋瘀久而熱鬱也殆是望文生義者已心下悸者半夏麻黃丸主之本草圖經引張仲景傷寒論同按趙氏論悸有三種文繁不録吐血不止者趙止作足趙夫水者遇寒則沉潛於下遇風則波濤於上人身之血與水無異也得寒而和則居經脈內養五臟得寒之凜冽者則凝而不流積而不散得熱之和者則運行經脈外充九竅得熱之甚者風自火狂則波濤洶起由是觀之吐血者風火也柏葉湯方本草圖經云張仲景方療吐血不止者柏葉湯主之青柏葉一把乾薑三片阿膠二鋌炙三味以水二升煮一升去滓別絞馬通汁一升相和合煎取一升綿濾一服盡之按本草黑字柏葉艾葉並味苦微溫無毒白字乾薑止血程氏所舉神農經及馬通性用並黑字文陶氏本草序例曰云一把者重二兩為正按醫心方稍有異同宜參又引範汪方云膠一鋌如三指大長三寸者一枚是也朱氏曰千金方有阿膠三兩亦佳但近日無真阿膠徒增黏膩耳下血先便後血此遠血也按徐氏曰下血較吐血勢順而不逆此病不在氣也當從腹中求責故以先便後血知未便時血分不動直至便後努責然後下血是內寒不能溫脾脾元不足不能統血脾居中土自下焦而言之則為遠矣此說似是仍存之下血先血後便此近血也趙此出大腸故先血後便以濕熱之毒蘊結不入於經滲於腸中而下赤小豆能行水濕解熱毒梅師方皆用此一味治下血況有當歸破宿養新以名義觀之血當有所歸則不妄行矣婦人良方曰糞後下血者其來遠糞前有血者其來近遠近者言病在上下也張氏醫通曰千金用伏龍肝湯即治先便後血之黃土湯中除去朮附加乾薑牛膝地榆發灰與金匱主治則有寒熱之殊不可不辨可見治血但使歸經不必論其遠近也外科正宗內痔治驗曰大抵此症所致之由不同當究其因治之如元氣有餘形黑氣盛先糞而後紫血者更兼脈實有力此屬有餘法當涼血止血藥應自效至若形體瘦弱面色痿黃先鮮血而後糞者更兼脈虛無力此屬不足豈可反用涼藥止之致傷脾胃此症若不溫中健脾升舉中氣其血不得歸原故藥難效遠其根本也按此說似與經旨相左然亦足以互發仍拈出之雞峰普濟方赤小豆散治大便祕即本方心氣不足吐血衄血按趙氏曰心氣不足者非心火之不足乃真陽之不足也此說屬傎尤氏暗駁正之實本於醫通趙又曰若濟衆方用大黃治衄血更有生地汁則是治熱涼血亦瀉心湯類耳此尤所本嘔吐噦下利病脈證治第十七問曰病人脈數數為熱脈弦者虛也以下脈經為別條病人欲吐者不可下之朱此揔為吐家而設大戒非特指胃反言也按傷寒嘔多雖有陽明證不可攻之其理一也又按脈經所載有出於本經之外者宜參閲今拈一條曰夫吐家脈來形狀如新臥起噦而腹滿按此條恐是錯出似宜在橘皮湯條上茱萸湯方本草圖經引人參一兩生薑一大兩大棗二十枚半夏瀉心湯方按再煮當作再煎黃芩加半夏生薑湯方按大棗十二個當作十二枚嘔吐而病在膈上外臺後下有必字嘔而脈弱小便復利按尤氏曰或云嘔與身熱為邪實厥利脈弱為正虛虛實互見故曰難治四逆湯舍其標而治其本也亦通此說不是姑存之嘔而發熱者證治準繩曰金匱方云云潔古用小柴胡湯加青黛以薑汁打糊丸名清鎮丸治嘔吐脈弦頭痛蓋本諸此按保命集名青鎮丸大半夏湯方本草圖經引半夏三升二百四十遍大觀本作一百四十遍政和本作一百二十遍二升半並作三升半余分再服作日再下有亦治膈間支飲句按魏氏曰服後多煮白蜜去其寒而用其潤俾黏膩之性流連於胃底不速下行而半夏人參之力可以徐斡旋於中其意固微矣哉此說頗巧然不如李升璽之穩貼醫心方範汪方治胸中乏氣而嘔欲死方人參二兩茯苓二兩生薑三兩白蜜五合半夏三升洗凡五物入蜜內六升水中撓之百遍以余藥合投中煮得三升分四服禁冷食治乾嘔亦用此本草圖經云李絳兵部手集療反胃嘔吐無常粥飲入口即吐困弱無力垂死者以上黨人參二大兩水一大升煮取四合熱頓服日再兼以人參汁煮粥與服又經驗後方治大人小兒不進乳食和氣去痰人參四兩半夏一兩生薑汁熬一宿曝乾為末麵糊丸如緑豆大每服十丸食後生薑湯吞下御藥院方橘皮枳殼湯治胸膈氣痞短氣噎悶不得升降枳殼麩炒去穰半夏不制各二兩陳皮不去白三兩人參一兩上四味用泉水五大升入白沙蜜四兩調勻用勺揚藥水二百四十遍煮取一大升去滓分作三服一日當服盡食後服之食已即吐者按高世械曰食已即吐者非宿穀不化之胃反乃火熱攻衝之吐逆沈氏曰此方脾胃乾結者宜之當與上不可下之條反復互看始得仲景前後之意朱氏曰胃反病在下脘因無陽氣化谷故食久反出今即吐明有實邪壅阻中脘不能容谷若邪阻上脘並不能食矣此諸說足與金鑑相發然先兄曰此證胃中舊有積滯故新谷入則不能相容霎時變出也古人屬火之說恐為強解此說為核且朱氏謂胃反病在下脘者誤蓋胃反胃中無物相得激故食下暫安而後出也此方用甘草取之能緩上迫遽引大黃令下達耳先兄又曰千金用單甘草湯治服湯嘔逆不入腹者正此湯用甘草之意又按金鑑朝食暮吐者寒也食已而吐者火也此寒火二字改為虛實其理自通尤氏又曰丹溪治小便不通用吐法以開提肺氣使上竅通而下竅亦通與大黃甘草湯之嘔吐法雖異而理可通也亦是胃反吐而渴欲飲水按此條證中焦蓄水氣液為之壅遏不能升騰滋養故使渴欲飲水李氏以為津液亡者誤矣宜參傷寒論輯義五苓散條又此方桂枝佐苓朮等以溫散水飲生薑以降逆氣尤氏以為散邪氣者亦誤矣茯苓澤瀉湯方外臺集驗茯苓小澤瀉湯按醫心方引經心方名茯苓湯聖濟治胃反吐逆發渴飲水茯苓飲方於本方去生薑加乾薑又治心脾壅滯暴渴引飲茯苓飲方於本方去生薑加黃連大黃小麥宣明桂苓白朮丸治消痰逆止咳嗽散痞滿壅塞開堅結痛悶於本方加半夏紅皮用乾生薑為末麵糊為丸如小豆大生薑湯下二三十丸日三服吐後渴欲得水而貪飲者按此條病輕藥重殊不相適柯氏以此湯移置於太陽下篇文蛤散條仍考此條乃是文蛤散證彼此相錯也消渴篇曰渴欲飲水不止者文蛤散主之可以互徵矣但兼主微風脈緊頭痛一句即湯方所主也半夏乾薑散方按半夏散不能散服者水煮此方漿水服俱是取於不戟咽乎後世有煮散法其理自異聖惠治冷痰飲胸膈氣滿吐逆不思飲食方於本方加丁香以生薑粥飲調下一錢半夏二兩余並一兩又治痰逆暖胃口惡飲食方於本方各半兩加白礬一兩燒灰為末以生薑汁煮麵糊和圓如梧桐子大每服不計時候以薑棗湯下二十丸生薑半夏湯方按此湯一升分四服殊與常例不同傷寒蘊要曰凡嘔而不止者服藥宜徐徐呷下不可急也蓋其義也乾嘔噦若手足厥者按乾嘔與噦自是二證蓋言乾嘔若噦也魏氏曰為病之淺者言之也若夫病之深陽氣微弱之甚者則非四逆不足以取效也或者先用此以順行其氣而後與以四逆亦次第淺深之治也此說失當橘皮湯方十便良方指迷橘皮甘草湯治若身大熱背微惡寒心中煩悶時時欲嘔渴不能飲頭目昏痛惡見日光遇涼稍清起居如故此由飲食失宜胃中空虛熱留胃口其脈虛大而數謂之中暑於本方加甘草橘皮竹茹湯方千金翼竹茹湯主噦方於本方去人參大棗加半夏紫蘇三因橘皮竹茹湯治胃熱多渴嘔噦不食於本方去大棗加茯苓枇杷葉麥門冬半夏衛生家寶人參竹茹湯治一切厄逆及治傷寒中暑等吐於本方去大棗加半夏活人事證方後集橘皮湯治中暑痰逆惡寒即本方傷寒蘊要橘皮竹茹湯治胃中壅熱而噦嘔者於本方去參姜棗加半夏茯苓黃連葛根傷寒大白人參橘皮竹茹湯治胃虛厄逆於本方去大棗加厚朴半夏藿香余述嘔吐之證其因不一今細檢經方吳茱萸湯之嘔與乾嘔因陰逆四逆湯之嘔因陽敗大黃甘草湯之吐因食壅除此之外凡十一方雖其兼涼兼溫之殊大要皆不出於驅飲逐水則知其繫於水飲所致者為多蓋胃喜燥而惡濕故水飲停瀦其氣易逆也蛔之為物最能使嘔敘在次篇噦啻舉氣逆證然黃疸篇有小半夏湯之法則亦有自停飲者可以推知而其更有數因前人辨之盡矣夫六腑氣絶於外者按金鑑曰氣絶非謂脫絶乃謂虛絶也朱氏曰按氣絶兩字當作病氣隔絶論若真陰陽氣絶豈止手足寒與不仁哉二說並存考程氏又曰不禁則上無脹悶中無痛楚下無奔迫但孔如竹筒漫無約束直流不休訶子粟殼咸無功矣雖有盧扁將安施乎此說信然下利脈數而渴者今自愈按邪熱逼血血滲入於腸故清膿血魏氏曰熱且蓄停腸脫釀為汙積膿血隨利而下此亦理之所有也下利清穀不可攻其表脈經脹滿下有其臟寒者當下之七字下利脈遲而滑者實也成氏曰經曰脈遲者食乾物得之按此語未詳所出當考金匱要略曰滑則穀氣實下利脈遲而滑者胃有宿食也脾胃傷食不消水穀是致下利者為內實若但以溫中厚腸之藥利必不止可與大承氣湯下去宿食利自止矣下利已瘥至其年月日時復發者按朱氏曰因初病利時漫用藥止住而病根不拔舊於此時受邪者臟氣即應時相感而復病焉此說不必又按傷寒纘論曰此條世本尚有宜大承氣湯五字衍文也故去之詳未盡之邪可以留伏經年而發必系寒邪寒邪惟可備急丸溫下不應大承氣寒下也設屬熱邪必無經年久伏之理此說拘執不可從又按脈經下利篇所載諸條出於本經之外者今録於左曰脈滑按之虛絶者其人必下利曰下利而腹痛滿者為寒實當下之曰下利腹中堅者當下之曰下利脈浮大者虛也以強下之故也設脈浮革因爾腸鳴當溫之病可溫證中亦有此條有宜當歸四逆湯字又傷寒論不可下篇有此條曰夫風寒下疑脫利字者不可下之下之後心下堅痛脈遲者為寒當溫之脈沉緊下之亦然脈大浮弦下之當已又病可溫證曰下利欲食者就溫之又曰下利脈遲緊為痛未欲止當溫之得冷者滿而便腸垢此條千金載在下利中千金痢門稍與脈經同更有一條曰下利大孔痛者當溫暖之紫參湯方本草圖經引甘草二兩一升半作半升氣利訶黎勒散主之趙治病有輕重前言氣利惟通小便此乃通大便蓋氣結處陰陽不同舉此二者為例六經皆得結而為利各有陰陽也訶黎勒有通有澀通以下涎消宿食破結氣澀以固腸脫佐以粥飲引腸胃更補虛也聖惠方曰夫氣痢者由表裡不足腸胃虛弱積冷之氣客於腸間臟腑不和因虛則泄故為氣痢也訶黎勒散方本草圖經云訶黎勒主痢本經不載張仲景治氣痢以訶黎勒十枚麵裹焙灰火中煨之令面黃熟去核細研為末和粥飲頓服云云唐劉禹錫傳信方云豫曾苦赤白下諸藥服遍久不瘥轉為白膿令狐將軍傳此法用訶黎勒三枚上好者兩枚炮取皮一枚生取皮同末之以沸漿水一兩合服之淡水亦得若空水痢加一錢匕甘草末若微有膿血加二匕若血多加三匕皆效本草衍義曰訶黎勒氣虛人亦宜緩緩煨熟少服此物雖澀腸而又泄氣蓋其味苦澀按程氏所引文不同又程氏引杜壬方本出本草黃連條云杜壬治氣痢瀉裡急後重云云用黃連甘姜二味又引劉禹錫傳信方亦是本草所引余述朱丹溪曰仲景治痢可溫者溫可下者下或解表或利小便或待其自已區別易治難治不治之證至為詳密然猶與滯下袞同立方命論出局方發揮蓋腸澼滯下與濡瀉滑泄其證與治本自不同仲景一以下利命之並而為篇然逐條尋究判然而明矣抑更有一義蓋濡瀉滑泄固宜溫固然有內有宿積而治宜疏刷者腸澼滯下固宜疏刷然有陽虛氣陷而治宜溫固者然則學者宜審其脈證而處其方劑不須特以腸澼泄瀉為分別仲景之合為一篇者意或在於此歟五十七難大瘕泄者裡急後重數至圊而不能便莖中痛亦即滯下而居五泄之一其意與仲景一也附方千金翼小承氣湯沈此燥屎內結大便不通壅逆胃邪上行而噦數譫語所以亦宜輕利和中而滌熱開結也外臺黃芩湯按此黃連湯類方亦治上熱下寒以為乾嘔下利也醫心方範汪方治傷寒五六日嘔而利者黃芩湯即本方瘡癰腸癰浸淫病脈證並治第十八脈經題曰癰腫腸癰金瘡浸淫脈證似是腸癰之為病其身甲錯本草圖經引云張仲景治腹癰腹有膿者薏苡仁附子敗醬湯按次條其癰未至膿潰故少腹腫痞此條既經膿潰故按之濡如腫狀腹無積聚次條血猶瘀結營鬱而衛阻故時時發熱復惡寒病猶屬實故其脈遲緊此條營分既無所郁故身無熱膿成則血燥故脈數要之此二條其別在膿已成與未成之分而不拘其部位如前注家以大小腸為辨者殆失之迂矣又按三因方舉此條云久積陰冷所成也故金匱用附子溫之舉次條云此以內結熱所成也故金匱用大黃利之亦不可從大黃牡丹湯方兒琰曰上條宜從巢源刪去小便自調四字而如淋上補小便數三字於理始順按癰腫之病不論外內諸證其初起也乘其未潰而奪之其既成也扶正氣以外托故葶藶大棗瀉肺湯肺癰逐毒之治也桔梗湯肺癰排膿之治也大黃牡丹湯腸癰逐毒之治也薏苡附子敗醬散腸癰排膿之治也蓋瘍醫之方皆莫不自此二端變化亦即仲景之法則也又按方後所謂有膿者其膿稍萌之義與前條之全就腐潰者不同矣聖濟梅仁湯治腸癰裡急隱痛大便祕澀於本方以梅核仁代桃仁用冬瓜仁加犀角按奇效梅仁散原方問曰寸口脈浮微而澀鑑脈微氣奪也脈澀血奪也故曰法當亡血汗出也設無亡血汗出等病則必身有瘡被刀斧所傷亡血也按不汗者一句宜云設不亡血若汗出者今特舉不汗而不云不亡血者蓋省文也金鑑為是又瘡古作創即金瘡之義也其從疒者繫於六朝俗字浸淫瘡黃連粉主之醫心方極要方療身上瘡瘡汁所著處即成瘡名曰浸淫癢不止方黃連一兩黃柏一兩蘆茹一兩礬石一兩甘草一兩生胡一兩上搗甘草以上為散胡粉於槍子中著熬令黃和之為散欲傳藥先以苦參汁以洗故帛拭乾即著藥不過三四度即瘥趺蹶手指臂腫轉筋陰狐疝蛔蟲病脈證治第十九魏氏曰仲景敘男子雜症因收羅細碎諸篇未及者歷言之雞屎白散方本草圖經引方寸匕上有量字陰狐疝氣者本草圖經引者字在上下字下四時刺逆從論曰厥陰滑則病狐疝風楊上善云狐夜不得尿日出方得人之所病與狐同故曰狐疝一曰孤疝謂三焦孤府為疝故曰孤疝五色篇曰狐疝㿉疝之屬也蜘蛛散方圖經引作二物為散每服八分二匕日再蜜丸亦通政和本一字不復小島尚質曰八分一匕謂十分方寸匕之八幼幼新書嬰孺治少小偏㿗方上以蜘蛛一個燒灰作末飲服之愈按本草無食子條引海藥云張仲景使治陰汗取燒灰先以微溫浴了即以帛微裛然傳灰囊之甚良政和本之作上此方可疑然以託名仲景姑附於斯問曰病腹痛有蟲巢源若作弱蓋訛甘草粉蜜湯方伊澤信恬曰外臺天行備急療勞復方以粉三升以暖飲和服又以水和胡粉少許服之亦佳據此則粉與胡粉自別可知
